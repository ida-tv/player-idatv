<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player IDATV - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .active-channel { background: rgba(59, 130, 246, 0.2); border-left: 4px solid #3b82f6; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .adult-blur { filter: blur(10px); pointer-events: none; }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 glass sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">PLAYER <span class="text-white">IDATV</span></h1>
            <div id="clock-container" class="hidden md:flex flex-col border-l border-slate-700 pl-4 leading-none">
                <span id="clock-time" class="text-lg font-mono font-bold text-white">00:00:00</span>
                <span id="clock-date" class="text-[10px] text-slate-400 uppercase tracking-widest">01.01.2026</span>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <div id="status-tag" class="text-[10px] px-2 py-1 rounded bg-red-500/20 text-red-400 border border-red-500/50">OFFLINE</div>
            <button onclick="toggleSettings()" class="text-xl hover:rotate-90 transition-transform duration-300">⚙️</button>
        </div>
    </header>

    <main class="flex flex-col lg:flex-row h-[calc(100vh-64px)]">
        
        <!-- Плеер и Инфо -->
        <div class="flex-[3] p-4 overflow-y-auto space-y-4 bg-slate-950">
            <!-- Видео -->
            <div class="aspect-video bg-black rounded-2xl border border-slate-800 shadow-2xl shadow-blue-500/5 overflow-hidden relative group">
                <video id="video" class="w-full h-full" controls playsinline></video>
                <div id="adult-overlay" class="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center hidden z-10">
                    <span class="text-4xl mb-4">🔞</span>
                    <p class="text-sm text-slate-400 mb-4">Канал защищен родительским контролем</p>
                    <button onclick="unlockAdult()" class="bg-blue-600 px-6 py-2 rounded-full font-bold">Введите ПИН</button>
                </div>
            </div>

            <!-- Программа передач (EPG) -->
            <div class="glass p-5 rounded-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-blue-400 text-xs font-black uppercase tracking-widest italic">Программа на 3 часа</h3>
                    <span id="current-chan-name" class="text-xs text-slate-500 font-bold">КАНАЛ НЕ ВЫБРАН</span>
                </div>
                <div id="epg-list" class="space-y-4">
                    <div class="animate-pulse flex space-x-4">
                        <div class="flex-1 space-y-3 py-1">
                            <div class="h-2 bg-slate-800 rounded"></div>
                            <div class="h-2 bg-slate-800 rounded w-5/6"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Боковая панель: Каналы -->
        <aside class="flex-1 border-l border-slate-800 glass flex flex-col">
            <div class="p-4 border-b border-slate-800 space-y-3">
                <div class="flex justify-between items-center text-xs font-black text-slate-400 tracking-tighter">
                    <span>КАНАЛЫ</span>
                    <span id="chan-count" class="bg-blue-600 text-white px-2 py-0.5 rounded-full text-[9px]">0</span>
                </div>
                <input type="text" id="search" oninput="filterChannels()" placeholder="Поиск канала..." class="w-full bg-slate-800/50 border border-slate-700 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div id="channel-list" class="flex-1 overflow-y-auto divide-y divide-slate-800/30">
                <!-- Сюда попадут каналы -->
            </div>
        </aside>
    </main>

    <!-- Настройки -->
    <div id="settings-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center hidden z-[100] p-4">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl w-full max-w-lg shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic">CONFIG <span class="text-blue-500">IDATV</span></h2>
                <button onclick="toggleSettings()" class="text-slate-500 hover:text-white">✕</button>
            </div>
            
            <div class="space-y-5">
                <div class="group">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1 group-focus-within:text-blue-500 transition">Плейлист (M3U8)</label>
                    <input id="m3u-url" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="https://server.com/playlist.m3u">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Телепрограмма (EPG XML)</label>
                    <input id="epg-url" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="https://server.com/epg.xml.gz">
                </div>
                <div class="p-4 bg-blue-500/5 rounded-xl border border-blue-500/10">
                    <p class="text-[10px] text-blue-400 font-bold uppercase mb-2">Удаленная активация</p>
                    <div class="flex justify-between items-center">
                        <span id="device-id" class="font-mono text-lg tracking-tighter text-white">ID: LOADING...</span>
                        <span class="text-[9px] bg-blue-500 text-white px-2 py-1 rounded">FREE TIER</span>
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all active:scale-95">Применить изменения</button>
            </div>
        </div>
    </div>

    <script>
        let allChannels = [];
        let hls = new Hls();
        const PIN = "1234"; // Твой ПИН для 18+

        // 1. ЧАСЫ И ДАТА
        function updateTime() {
            const now = new Date();
            document.getElementById('clock-time').textContent = now.toLocaleTimeString('ru-RU', {hour12: false});
            document.getElementById('clock-date').textContent = now.toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit', year: 'numeric'});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. УПРАВЛЕНИЕ НАСТРОЙКАМИ
        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
        }

        function saveSettings() {
            localStorage.setItem('idatv_m3u', document.getElementById('m3u-url').value);
            localStorage.setItem('idatv_epg', document.getElementById('epg-url').value);
            location.reload();
        }

        // 3. ЗАГРУЗКА ПЛЕЙЛИСТА
        async function loadData() {
            const m3u = localStorage.getItem('idatv_m3u');
            const epg = localStorage.getItem('idatv_epg');
            
            if (m3u) {
                document.getElementById('m3u-url').value = m3u;
                try {
                    const res = await fetch(m3u);
                    const text = await res.text();
                    parseM3U(text);
                    document.getElementById('status-tag').textContent = 'ONLINE';
                    document.getElementById('status-tag').className = 'text-[10px] px-2 py-1 rounded bg-green-500/20 text-green-400 border border-green-500/50';
                } catch(e) {
                    console.error("Fetch error. Possible CORS issue.");
                }
            }
            if (epg) document.getElementById('epg-url').value = epg;
            
            // Генерация Device ID (для "удаленной активации")
            document.getElementById('device-id').textContent = "ID: " + Math.random().toString(36).substr(2, 9).toUpperCase();
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            allChannels = [];
            let current = null;

            lines.forEach(line => {
                if (line.startsWith('#EXTINF:')) {
                    current = {
                        name: line.split(',')[1]?.trim() || "Без названия",
                        logo: line.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        group: line.match(/group-title="([^"]+)"/)?.[1] || "Общие",
                        id: line.match(/tvg-id="([^"]+)"/)?.[1] || ""
                    };
                } else if (line.startsWith('http') && current) {
                    current.url = line.trim();
                    current.isAdult = /adult|18\+|xxx|эротика|ero/i.test(current.group + current.name);
                    allChannels.push(current);
                    current = null;
                }
            });
            renderChannels(allChannels);
            document.getElementById('chan-count').textContent = allChannels.length;
        }

        function renderChannels(list) {
            const container = document.getElementById('channel-list');
            container.innerHTML = list.map((ch, index) => `
                <div onclick="selectChannel(${index})" id="chan-${index}" class="p-4 hover:bg-slate-800/50 cursor-pointer transition flex items-center gap-4 group border-l-4 border-transparent">
                    <div class="relative">
                        <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/100x100?text=TV'" class="w-12 h-12 object-contain bg-slate-900 rounded-lg border border-slate-700 group-hover:scale-105 transition">
                        ${ch.isAdult ? '<span class="absolute -top-1 -right-1 text-[10px]">🔞</span>' : ''}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="text-sm font-bold truncate group-hover:text-blue-400 transition">${ch.name}</div>
                        <div class="text-[9px] text-slate-500 uppercase font-black tracking-widest">${ch.group}</div>
                    </div>
                </div>
            `).join('');
        }

        // 4. ПЛЕЕР И АРХИВ
        let activeIdx = null;

        function selectChannel(index) {
            activeIdx = index;
            const ch = allChannels[index];
            
            // Сброс стилей
            document.querySelectorAll('[id^="chan-"]').forEach(el => el.classList.remove('active-channel'));
            document.getElementById(`chan-${index}`).classList.add('active-channel');
            document.getElementById('current-chan-name').textContent = ch.name;

            if (ch.isAdult) {
                document.getElementById('adult-overlay').classList.remove('hidden');
                return;
            }

            playStream(ch.url);
            generateFakeEPG(ch.name);
        }

        function playStream(url) {
            const video = document.getElementById('video');
            document.getElementById('adult-overlay').classList.add('hidden');

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = url;
            }
        }

        function unlockAdult() {
            const pass = prompt("Родительский контроль. Введите ПИН:");
            if (pass === PIN) {
                playStream(allChannels[activeIdx].url);
                generateFakeEPG(allChannels[activeIdx].name);
            } else {
                alert("Доступ запрещен!");
            }
        }

        // 5. ИМИТАЦИЯ EPG И АРХИВА (за 3 часа)
        function generateFakeEPG(name) {
            const container = document.getElementById('epg-list');
            const now = new Date();
            let html = '';

            for (let i = 0; i < 4; i++) {
                const startTime = new Date(now.getTime() + (i * 45 * 60 * 1000));
                const timeStr = startTime.getHours().toString().padStart(2,'0') + ":" + startTime.getMinutes().toString().padStart(2,'0');
                
                html += `
                    <div class="flex gap-4 items-start ${i === 0 ? 'bg-blue-500/10 -mx-2 p-2 rounded-xl border border-blue-500/20' : 'opacity-40'}">
                        <span class="font-mono text-blue-400 text-xs mt-1 font-bold">${timeStr}</span>
                        <div>
                            <div class="text-sm font-bold text-white">${i === 0 ? 'СЕЙЧАС: ' : ''} Передача ${i + 1}</div>
                            <div class="text-[10px] text-slate-500 uppercase tracking-tighter">Архив доступен • 45 мин.</div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function filterChannels() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(query) || c.group.toLowerCase().includes(query));
            renderChannels(filtered);
        }

        window.onload = loadData;
    </script>
</body>
</html>
