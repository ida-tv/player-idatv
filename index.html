<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player IDATV - Final Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.98); border: 1px solid #1e293b; }
        .active-ch { background: #2563eb !important; border-left: 4px solid #60a5fa; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body onkeydown="handleKeys(event)">

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-6 glass">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-500 italic uppercase">Player <span class="text-white font-sans">IDATV</span></h1>
            <div id="clock" class="text-xs font-mono text-slate-500 border-l border-slate-700 pl-4 uppercase">00:00:00</div>
        </div>
        <div id="status" class="text-[10px] text-yellow-500 animate-pulse uppercase font-bold">Синхронизация...</div>
    </header>

    <main class="flex h-[calc(100vh-56px)] flex-col lg:flex-row bg-slate-950">
        <div class="flex-[3] flex flex-col p-4 gap-4 overflow-y-auto">
            <!-- Плеер -->
            <div class="relative aspect-video bg-black rounded-3xl border border-slate-800 shadow-2xl overflow-hidden">
                <video id="tv" class="w-full h-full" controls autoplay playsinline></video>
                <div id="lock" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center hidden z-50">
                    <p class="mb-4 font-bold text-red-500 uppercase tracking-widest">🔞 Защита 18+</p>
                    <input id="pin-in" type="password" maxlength="4" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-center text-2xl w-32 outline-none">
                    <button onclick="checkPin()" class="mt-4 bg-blue-600 px-10 py-2 rounded-xl font-bold uppercase">OK</button>
                </div>
            </div>

            <!-- EPG и Описание -->
            <div class="glass p-6 rounded-3xl border-blue-500/20">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="ch-title" class="text-xl font-bold italic text-white uppercase tracking-tighter">Выберите канал</h2>
                    <span class="text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full font-bold uppercase">Архив 72 часа</span>
                </div>
                <div id="epg-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <!-- Программа передач -->
                </div>
            </div>
        </div>

        <!-- Список -->
        <aside class="w-full lg:w-[400px] border-l border-slate-800 glass flex flex-col">
            <div class="p-4 border-b border-slate-800 space-y-3 bg-slate-900/30">
                <select id="cats" onchange="filterList()" class="w-full bg-slate-800 border border-slate-700 p-2 rounded text-[10px] uppercase font-bold outline-none"></select>
                <input id="search" oninput="filterList()" placeholder="ПОИСК (↑ ↓ ENTER)" class="w-full bg-slate-950 border border-slate-800 p-2 rounded text-xs outline-none">
            </div>
            <div id="list" class="flex-1 overflow-y-auto"></div>
        </aside>
    </main>

    <script>
        let chs = [];
        let hls = new Hls();
        let currentFocusIdx = 0;
        let globalPin = "1234";

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        async function init() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                globalPin = config.pin;
                
                const m3uRes = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(config.playlist));
                const text = await m3uRes.text();
                parse(text);
                document.getElementById('status').innerText = "ONLINE";
                document.getElementById('status').className = "text-[10px] text-green-500 uppercase font-bold";
            } catch(e) {
                document.getElementById('status').innerText = "ОШИБКА КОНФИГА";
            }
        }

        function parse(data) {
            const lines = data.split('\n');
            const cats = new Set(["Все категории"]);
            chs = [];
            let cur = null;

            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    const g = l.match(/group-title="([^"]+)"/)?.[1] || "ОБЩИЕ";
                    cats.add(g);
                    cur = {
                        n: l.split(',')[1]?.trim() || "TV Channel",
                        g: g,
                        l: l.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        a: /adult|18\+|xxx/i.test(g + l)
                    };
                } else if (l.startsWith('http') && cur) {
                    cur.u = l.trim();
                    chs.push({...cur});
                }
            });

            const sel = document.getElementById('cats');
            cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
            render(chs);
        }

        function render(list) {
            const c = document.getElementById('list');
            c.innerHTML = list.map((item, i) => `
                <div onclick="selectCh(${i})" id="ch-${i}" class="p-4 flex items-center gap-4 cursor-pointer hover:bg-slate-800 transition border-b border-slate-800/10">
                    <img src="${item.l}" class="w-10 h-10 rounded-lg bg-black object-contain border border-slate-800" onerror="this.src='https://via.placeholder.com/40'">
                    <div class="flex-1 overflow-hidden">
                        <div class="text-[13px] font-bold truncate uppercase italic tracking-tighter">${item.n}</div>
                        <div class="text-[9px] text-slate-500 font-bold uppercase mt-1 leading-none">${item.g}</div>
                    </div>
                </div>
            `).join('');
        }

        function selectCh(i) {
            currentFocusIdx = i;
            document.querySelectorAll('[id^="ch-"]').forEach(el => el.classList.remove('active-ch'));
            document.getElementById('ch-'+i).classList.add('active-ch');
            const item = chs[i];
            if (item.a) { document.getElementById('lock').classList.remove('hidden'); return; }
            start(item.u, item.n);
        }

        function checkPin() {
            if (document.getElementById('pin-in').value === globalPin) {
                document.getElementById('lock').classList.add('hidden');
                start(chs[currentFocusIdx].u, chs[currentFocusIdx].n);
            } else alert("НЕВЕРНО");
        }

        function start(u, n) {
            document.getElementById('ch-title').innerText = n;
            const v = document.getElementById('tv');
            if (Hls.isSupported()) {
                hls.destroy(); hls = new Hls();
                hls.loadSource(u); hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else { v.src = u; v.play(); }

            // Эфир и Архив
            const grid = document.getElementById('epg-grid');
            grid.innerHTML = "";
            const now = new Date();
            for(let j=-1; j<3; j++) {
                const t = new Date(now.getTime() + (j * 50 * 60 * 1000));
                grid.innerHTML += `
                    <div class="p-4 rounded-2xl glass ${j===0 ? 'bg-blue-600/10 border-blue-500/50' : 'opacity-40'}">
                        <div class="flex justify-between mb-2 uppercase font-black text-[9px]">
                            <span class="text-blue-400">${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}</span>
                            <span>${j<0 ? 'Архив' : (j===0 ? 'Эфир' : 'Далее')}</span>
                        </div>
                        <div class="text-[11px] font-bold truncate uppercase tracking-tighter">${n} — Программа ${j+2}</div>
                    </div>
                `;
            }
        }

        function filterList() {
            const g = document.getElementById('cats').value;
            const s = document.getElementById('search').value.toLowerCase();
            const f = chs.filter(i => (g === 'Все категории' || i.g === g) && i.n.toLowerCase().includes(s));
            render(f);
        }

        function handleKeys(e) {
            if (e.key === 'ArrowDown') selectCh(Math.min(currentFocusIdx + 1, chs.length - 1));
            if (e.key === 'ArrowUp') selectCh(Math.max(currentFocusIdx - 1, 0));
        }

        init();
    </script>
</body>
</html>
