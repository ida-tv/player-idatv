<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player IDATV - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .active-chan { background: linear-gradient(90deg, rgba(59, 130, 246, 0.3) 0%, transparent 100%); border-left: 4px solid #3b82f6; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .epg-progress { height: 2px; background: #1e293b; width: 100%; position: relative; margin-top: 4px; }
        .epg-progress-bar { height: 100%; background: #3b82f6; position: absolute; }
    </style>
</head>
<body>

    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 glass">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black text-blue-500">PLAYER <span class="text-white">IDATV</span></h1>
            <div class="text-slate-400 font-mono text-sm border-l border-slate-700 pl-4">
                <span id="header-time">00:00:00</span> <span class="mx-2 text-slate-600">|</span> <span id="header-date">01.01.2026</span>
            </div>
        </div>
        <button onclick="toggleSettings()" class="w-10 h-10 flex items-center justify-center hover:bg-slate-800 rounded-full transition">⚙️</button>
    </header>

    <main class="flex h-[calc(100vh-64px)]">
        <!-- Видео и EPG -->
        <div class="flex-[3] flex flex-col p-4 gap-4 overflow-y-auto bg-slate-950">
            <div class="relative aspect-video bg-black rounded-3xl border border-slate-800 shadow-2xl overflow-hidden group">
                <video id="main-video" class="w-full h-full" controls autoplay></video>
                <div id="lock-screen" class="absolute inset-0 bg-slate-900/95 flex flex-col items-center justify-center hidden z-20">
                    <div class="text-6xl mb-4">🔐</div>
                    <div class="text-xl font-bold mb-4">Канал заблокирован</div>
                    <input id="pin-input" type="password" placeholder="ПИН-КОД" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-center tracking-[1em] outline-none focus:border-blue-500">
                    <button onclick="checkPin()" class="mt-4 bg-blue-600 px-8 py-2 rounded-xl font-bold">ОТКРЫТЬ</button>
                </div>
            </div>

            <!-- Инфо о текущей передаче -->
            <div id="now-playing" class="glass p-6 rounded-3xl border border-blue-500/20">
                <div class="flex justify-between items-start mb-2">
                    <h2 id="epg-now-title" class="text-xl font-bold text-white">Прямой эфир</h2>
                    <span id="epg-time-range" class="text-blue-400 font-mono text-sm">--:--</span>
                </div>
                <p id="epg-now-desc" class="text-slate-400 text-sm leading-relaxed mb-4">Выберите канал для загрузки программы передач...</p>
                <div class="epg-progress"><div id="epg-bar" class="epg-progress-bar" style="width: 0%"></div></div>
                
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mt-6 mb-4 italic">Архив и ближайшие передачи:</h3>
                <div id="epg-list" class="space-y-3"></div>
            </div>
        </div>

        <!-- Боковое меню -->
        <aside class="flex-1 border-l border-slate-800 glass flex flex-col w-[400px]">
            <div class="p-4 border-b border-slate-800 space-y-3">
                <select id="group-select" onchange="filterChannels()" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-sm outline-none focus:border-blue-500 transition cursor-pointer">
                    <option value="all">Все категории</option>
                </select>
                <input type="text" id="search" oninput="filterChannels()" placeholder="Поиск канала..." class="w-full bg-slate-900 border border-slate-800 p-2 rounded-lg text-sm outline-none focus:border-blue-500">
            </div>
            <div id="chan-list" class="flex-1 overflow-y-auto"></div>
        </aside>
    </main>

    <!-- Настройки -->
    <div id="settings" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-[40px] w-full max-w-lg shadow-3xl">
            <h2 class="text-3xl font-black mb-6 italic text-blue-500 tracking-tighter">SETUP IDATV</h2>
            <div class="space-y-4">
                <input id="m3u-url" type="text" placeholder="Ссылка на M3U8" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-500 transition">
                <input id="epg-url" type="text" placeholder="Ссылка на XMLTV (EPG)" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-500 transition">
                <div class="flex gap-4">
                    <input id="pin-setup" type="text" placeholder="Новый ПИН (4 цифры)" class="flex-1 bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-500 transition">
                </div>
                <button onclick="save()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg transition shadow-lg shadow-blue-600/20 active:scale-95">СОХРАНИТЬ</button>
                <button onclick="toggleSettings()" class="w-full text-slate-500 font-bold">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <script>
        let channels = [];
        let epgData = {};
        let hls = new Hls();
        const proxy = "https://api.allorigins.win/raw?url="; // Прокси для обхода CORS

        // Обновление часов
        setInterval(() => {
            const n = new Date();
            document.getElementById('header-time').innerText = n.toLocaleTimeString();
            document.getElementById('header-date').innerText = n.toLocaleDateString();
        }, 1000);

        function toggleSettings() { document.getElementById('settings').classList.toggle('hidden'); }

        function save() {
            localStorage.setItem('m3u', document.getElementById('m3u-url').value);
            localStorage.setItem('epg', document.getElementById('epg-url').value);
            localStorage.setItem('pin', document.getElementById('pin-setup').value || "1234");
            location.reload();
        }

        async function init() {
            const m3u = localStorage.getItem('m3u');
            const epg = localStorage.getItem('epg');
            document.getElementById('m3u-url').value = m3u || '';
            document.getElementById('epg-url').value = epg || '';
            document.getElementById('pin-setup').value = localStorage.getItem('pin') || "1234";

            if (m3u) {
                const res = await fetch(proxy + encodeURIComponent(m3u));
                const text = await res.text();
                parseM3U(text);
            }
            if (epg) fetchEPG(epg);
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const groups = new Set();
            channels = [];
            let current = null;

            lines.forEach(line => {
                if (line.startsWith('#EXTINF:')) {
                    const g = line.match(/group-title="([^"]+)"/)?.[1] || "Общие";
                    groups.add(g);
                    current = {
                        name: line.split(',')[1]?.trim(),
                        group: g,
                        logo: line.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        id: line.match(/tvg-id="([^"]+)"/)?.[1] || ""
                    };
                } else if (line.startsWith('http')) {
                    current.url = line.trim();
                    current.isAdult = /adult|18\+|xxx|эротика|ero/i.test(current.group + current.name);
                    channels.push(current);
                }
            });

            const select = document.getElementById('group-select');
            groups.forEach(g => select.innerHTML += `<option value="${g}">${g}</option>`);
            renderChannels(channels);
        }

        function renderChannels(list) {
            const cont = document.getElementById('chan-list');
            cont.innerHTML = list.map((c, i) => `
                <div onclick="play(${i})" class="p-4 flex items-center gap-4 hover:bg-slate-800/40 cursor-pointer transition border-b border-slate-800/30">
                    <img src="${c.logo}" class="w-10 h-10 rounded-lg bg-black object-contain border border-slate-700" onerror="this.src='https://via.placeholder.com/40'">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold truncate text-sm">${c.name}</div>
                        <div class="text-[10px] text-slate-500 font-bold uppercase">${c.group}</div>
                    </div>
                    ${c.isAdult ? '<span>🔐</span>' : ''}
                </div>
            `).join('');
        }

        function filterChannels() {
            const g = document.getElementById('group-select').value;
            const s = document.getElementById('search').value.toLowerCase();
            const filtered = channels.filter(c => (g === 'all' || c.group === g) && c.name.toLowerCase().includes(s));
            renderChannels(filtered);
        }

        let playingIndex = -1;
        function play(idx) {
            playingIndex = idx;
            const c = channels[idx];
            if (c.isAdult) {
                document.getElementById('lock-screen').classList.remove('hidden');
                return;
            }
            startStream(c.url);
            showEPG(c.id, c.name);
        }

        function checkPin() {
            if (document.getElementById('pin-input').value === (localStorage.getItem('pin') || "1234")) {
                document.getElementById('lock-screen').classList.add('hidden');
                startStream(channels[playingIndex].url);
                showEPG(channels[playingIndex].id, channels[playingIndex].name);
            } else {
                alert("НЕВЕРНЫЙ ПИН!");
            }
        }

        function startStream(url) {
            const v = document.getElementById('main-video');
            if (Hls.isSupported()) {
                hls.destroy(); hls = new Hls();
                hls.loadSource(url); hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            }
        }

        // Имитация и парсинг EPG для демонстрации (так как реальный XMLTV тяжелый)
        function showEPG(id, name) {
            document.getElementById('epg-now-title').innerText = name;
            const list = document.getElementById('epg-list');
            list.innerHTML = "";
            const now = new Date();

            for (let i = -2; i < 5; i++) { // Архив -2 часа, Будущее +5
                const start = new Date(now.getTime() + (i * 45 * 60 * 1000));
                const isArchive = i < 0;
                list.innerHTML += `
                    <div onclick="${isArchive ? 'playArchive('+idx+')' : ''}" class="flex gap-4 p-3 rounded-2xl transition ${i===0 ? 'bg-blue-600/20 border border-blue-500/30' : 'hover:bg-slate-800/40 cursor-pointer'}">
                        <span class="font-mono text-blue-400 text-xs mt-1">${start.getHours()}:${String(start.getMinutes()).padStart(2,'0')}</span>
                        <div class="flex-1">
                            <div class="text-sm font-bold">${i===0 ? 'СЕЙЧАС В ЭФИРЕ' : 'Программа ' + (i+3)}</div>
                            <div class="text-[10px] text-slate-500 uppercase">${isArchive ? '🎞 СМОТРЕТЬ ЗАПИСЬ' : 'СКОРО'}</div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('epg-bar').style.width = "45%";
            document.getElementById('epg-time-range').innerText = now.getHours() + ":00 - " + (now.getHours()+1) + ":00";
        }

        init();
    </script>
</body>
</html>
