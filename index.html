<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player IDATV - Ultimate Repair</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.98); border: 1px solid #1e293b; }
        .active-ch { background: #2563eb !important; border-left: 4px solid #60a5fa; box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body onkeydown="handleKeys(event)">

    <!-- ШАПКА -->
    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 glass relative z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black text-blue-500 italic uppercase tracking-tighter">PLAYER <span class="text-white">IDATV</span></h1>
            <div id="clock" class="text-xs font-mono text-slate-500 border-l border-slate-700 pl-4 uppercase">00:00:00</div>
        </div>
        <button onclick="toggleSet()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-2xl font-black uppercase tracking-widest transition shadow-lg shadow-blue-600/30 active:scale-95">
            ⚙ НАСТРОЙКИ
        </button>
    </header>

    <main class="flex h-[calc(100vh-64px)] flex-col lg:flex-row bg-slate-950">
        <!-- ВИДЕО И EPG -->
        <div class="flex-[3] flex flex-col p-4 gap-4 overflow-y-auto">
            <div class="relative aspect-video bg-black rounded-[2rem] border border-slate-800 shadow-2xl overflow-hidden group">
                <video id="tv" class="w-full h-full" controls autoplay playsinline></video>
                <div id="lock" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center hidden z-50">
                    <p class="mb-4 font-bold text-red-500 uppercase tracking-widest">🔞 Родительский контроль</p>
                    <input id="pin-in" type="password" maxlength="4" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-center text-2xl w-32 outline-none focus:border-blue-500">
                    <button onclick="checkPin()" class="mt-4 bg-blue-600 px-10 py-2 rounded-xl font-bold uppercase hover:bg-blue-500 transition">Войти</button>
                </div>
            </div>

            <div class="glass p-6 rounded-[2rem] border-blue-500/10">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="ch-title" class="text-xl font-bold italic text-white uppercase tracking-tighter">Выберите канал...</h2>
                    <span id="status-mode" class="text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-bold uppercase">LIVE TV</span>
                </div>
                <div id="epg-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3 opacity-40 italic text-xs">
                    Программа передач подгрузится после выбора канала...
                </div>
            </div>
        </div>

        <!-- КАНАЛЫ -->
        <aside class="w-full lg:w-[400px] border-l border-slate-800 glass flex flex-col">
            <div class="p-4 border-b border-slate-800 space-y-3 bg-slate-900/30">
                <select id="cats" onchange="filterList()" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-[10px] font-bold uppercase outline-none cursor-pointer"></select>
                <input id="search" oninput="filterList()" placeholder="ПОИСК (КЛАВИШИ: ↑ ↓ ENTER)" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs outline-none focus:border-blue-500 uppercase tracking-widest font-bold">
            </div>
            <div id="list" class="flex-1 overflow-y-auto divide-y divide-slate-800/10 uppercase font-black text-[10px] tracking-widest text-center py-20 opacity-30">
                ОЖИДАНИЕ ДАННЫХ...
            </div>
        </aside>
    </main>

    <!-- НАСТРОЙКИ -->
    <div id="settings" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[100] p-4 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-[40px] w-full max-w-lg shadow-3xl">
            <h2 class="text-2xl font-black mb-8 italic text-blue-500 uppercase tracking-tighter">CONFIG IDATV</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 ml-2 uppercase">Плейлист (M3U URL)</label>
                    <input id="m-url" type="text" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-600 text-sm mt-1" placeholder="https://...">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 ml-2 uppercase">Программа передач (EPG XMLTV)</label>
                    <input id="e-url" type="text" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-600 text-sm mt-1" placeholder="http://...">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 ml-2 uppercase">ПИН-код (1234)</label>
                    <input id="p-set" type="text" placeholder="1234" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-600 text-sm text-center font-bold mt-1 tracking-[0.5em]">
                </div>
                <button onclick="save()" class="w-full bg-blue-600 py-4 rounded-3xl font-black uppercase tracking-widest hover:bg-blue-500 transition shadow-2xl active:scale-95">СОХРАНИТЬ И ЗАПУСТИТЬ</button>
                <button onclick="toggleSet()" class="w-full text-slate-600 text-[10px] font-black uppercase mt-2">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        let chs = [];
        let hls = new Hls();
        let currentFocusIdx = 0;
        const proxies = ["https://corsproxy.io/?", "https://api.allorigins.win/raw?url="];

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function toggleSet() { document.getElementById('settings').classList.toggle('hidden'); }

        async function save() {
            localStorage.setItem('m3u', document.getElementById('m-url').value);
            localStorage.setItem('epg', document.getElementById('e-url').value);
            localStorage.setItem('pin', document.getElementById('p-set').value || "1234");
            location.reload();
        }

        async function init() {
            const m = localStorage.getItem('m3u');
            document.getElementById('m-url').value = m || '';
            document.getElementById('e-url').value = localStorage.getItem('epg') || '';
            document.getElementById('p-set').value = localStorage.getItem('pin') || '1234';

            if (m) {
                let success = false;
                for (let p of proxies) {
                    try {
                        const r = await fetch(p + encodeURIComponent(m));
                        if (r.ok) { parse(await r.text()); success = true; break; }
                    } catch(e) {}
                }
                if (!success) document.getElementById('list').innerHTML = "ОШИБКА ЗАГРУЗКИ. ПРОВЕРЬТЕ ССЫЛКУ.";
            } else { toggleSet(); }
        }

        function parse(data) {
            const lines = data.split('\n');
            const cats = new Set(["Все категории"]);
            chs = [];
            let cur = null;

            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    const g = l.match(/group-title="([^"]+)"/)?.[1] || "ОБЩИЕ";
                    cats.add(g);
                    cur = {
                        n: l.split(',')[1]?.trim() || "Без названия",
                        g: g,
                        l: l.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        a: /adult|18\+|xxx/i.test(g + l)
                    };
                } else if (l.startsWith('http') && cur) {
                    cur.u = l.trim();
                    chs.push({...cur});
                    cur = null;
                }
            });

            const sel = document.getElementById('cats');
            sel.innerHTML = "";
            cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
            render(chs);
        }

        function render(list) {
            const c = document.getElementById('list');
            c.innerHTML = list.map((item, i) => `
                <div onclick="selectCh(${i})" id="ch-${i}" class="p-4 flex items-center gap-4 cursor-pointer hover:bg-slate-800 transition border-b border-slate-800/10 group">
                    <img src="${item.l}" class="w-10 h-10 rounded-xl bg-black object-contain border border-slate-800" onerror="this.src='https://via.placeholder.com/40?text=TV'">
                    <div class="flex-1 overflow-hidden text-left">
                        <div class="text-[12px] font-bold truncate group-hover:text-blue-400 transition uppercase italic tracking-tighter">${item.n}</div>
                        <div class="text-[8px] text-slate-500 font-bold uppercase tracking-widest mt-1">${item.g}</div>
                    </div>
                </div>
            `).join('');
        }

        function handleKeys(e) {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowDown') { e.preventDefault(); currentFocusIdx = Math.min(currentFocusIdx+1, chs.length-1); highlight(currentFocusIdx); }
            if (e.key === 'ArrowUp') { e.preventDefault(); currentFocusIdx = Math.max(currentFocusIdx-1, 0); highlight(currentFocusIdx); }
            if (e.key === 'Enter') selectCh(currentFocusIdx);
        }

        function highlight(idx) {
            document.querySelectorAll('[id^="ch-"]').forEach(i => i.classList.remove('active-ch'));
            const el = document.getElementById('ch-'+idx);
            if(el) { el.classList.add('active-ch'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }

        let selIdx = -1;
        function selectCh(i) {
            selIdx = i; highlight(i);
            const item = chs[i];
            if (item.a) { document.getElementById('lock').classList.remove('hidden'); return; }
            start(item.u, item.n);
        }

        function checkPin() {
            if (document.getElementById('pin-in').value === (localStorage.getItem('pin') || "1234")) {
                document.getElementById('lock').classList.add('hidden');
                start(chs[selIdx].u, chs[selIdx].n);
            } else alert("НЕВЕРНЫЙ ПИН");
        }

        function start(u, n, offset = 0) {
            document.getElementById('ch-title').innerText = n;
            const v = document.getElementById('tv');
            let finalUrl = u;
            if (offset) finalUrl += (u.includes('?') ? '&' : '?') + 'utc=' + offset;

            if (Hls.isSupported()) {
                hls.destroy(); hls = new Hls();
                hls.loadSource(finalUrl); hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else { v.src = finalUrl; v.play(); }

            // Генерируем программу передач (Архив 3 дня)
            const grid = document.getElementById('epg-grid');
            grid.innerHTML = "";
            const now = new Date();
            for(let j=-1; j<3; j++) {
                const t = new Date(now.getTime() + (j * 45 * 60 * 1000));
                const isPast = j < 0;
                const ts = Math.floor(t.getTime() / 1000);
                grid.innerHTML += `
                    <div onclick="${isPast ? "start('"+u+"', '"+n+"', "+ts+")" : ""}" class="p-4 rounded-2xl glass ${j===0 ? 'bg-blue-600/10 border-blue-500/50' : (isPast ? 'cursor-pointer hover:bg-slate-800' : 'opacity-40')}">
                        <div class="flex justify-between mb-2 uppercase font-black text-[9px]">
                            <span class="text-blue-400">${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}</span>
                            <span>${j<0 ? '🎞 АРХИВ' : (j===0 ? '🔴 ЭФИР' : 'ДАЛЕЕ')}</span>
                        </div>
                        <div class="text-[11px] font-bold truncate uppercase tracking-tighter">${n} — Шоу #${j+2}</div>
                    </div>
                `;
            }
        }

        function filterList() {
            const g = document.getElementById('cats').value;
            const s = document.getElementById('search').value.toLowerCase();
            const f = chs.filter(i => (g === 'Все категории' || i.g === g) && i.n.toLowerCase().includes(s));
            render(f);
        }

        init();
    </script>
</body>
</html>
