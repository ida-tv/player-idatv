<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player IDATV - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.95); border: 1px solid #1e293b; }
        .active-ch { background: #2563eb !important; border-left: 4px solid #60a5fa; box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body onkeydown="handleKeys(event)">

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-6 glass relative z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-500 italic uppercase">Player <span class="text-white">IDATV</span></h1>
            <div class="text-[11px] font-mono text-slate-500 border-l border-slate-700 pl-4">
                <span id="h-time" class="text-white font-bold text-sm">00:00:00</span> | <span id="h-date">02.05.2026</span>
            </div>
        </div>
        <button onclick="toggleSet()" class="p-2 hover:bg-slate-800 rounded-xl transition font-bold text-sm">⚙ Настройки</button>
    </header>

    <main class="flex h-[calc(100vh-56px)] flex-col lg:flex-row bg-slate-950">
        <div class="flex-[3] flex flex-col p-4 gap-4 overflow-y-auto">
            <div class="relative aspect-video bg-black rounded-3xl border border-slate-800 shadow-2xl overflow-hidden group">
                <video id="tv" class="w-full h-full" controls autoplay playsinline></video>
                <div id="lock" class="absolute inset-0 bg-slate-900/98 flex flex-col items-center justify-center hidden z-50">
                    <p class="mb-4 font-bold tracking-widest text-red-500">🔞 РОДИТЕЛЬСКИЙ КОНТРОЛЬ</p>
                    <input id="pin-in" type="password" maxlength="4" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-center text-2xl w-32 outline-none focus:border-blue-500">
                    <button onclick="checkPin()" class="mt-4 bg-blue-600 px-10 py-2 rounded-xl font-bold uppercase hover:bg-blue-500">Войти</button>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl border-blue-500/20">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="ch-title" class="text-xl font-bold italic">Выберите канал...</h2>
                    <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded border border-blue-500/30 font-bold uppercase">Архив 3 дня</span>
                </div>
                <div id="epg-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="p-4 rounded-2xl glass opacity-30 text-xs uppercase tracking-tighter italic">Программа передач появится здесь...</div>
                </div>
            </div>
        </div>

        <aside class="w-full lg:w-[400px] border-l border-slate-800 glass flex flex-col">
            <div class="p-4 border-b border-slate-800 space-y-3 bg-slate-900/30">
                <select id="cats" onchange="filterList()" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-[10px] font-bold uppercase outline-none"></select>
                <input id="search" oninput="filterList()" placeholder="Поиск (Клавиши: ↑ ↓ Enter)" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs outline-none focus:border-blue-500">
            </div>
            <div id="list" class="flex-1 overflow-y-auto divide-y divide-slate-800/10">
                <p class="p-10 text-center opacity-30 text-xs uppercase italic">Загрузка каналов...</p>
            </div>
        </aside>
    </main>

    <div id="settings" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[100] p-4 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-[40px] w-full max-w-lg shadow-3xl">
            <h2 class="text-2xl font-black mb-8 italic text-blue-500 uppercase tracking-tighter">Настройки IDATV</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 ml-2 uppercase">M3U Плейлист</label>
                    <input id="m-url" type="text" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-600 text-sm mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 ml-2 uppercase">EPG XMLTV</label>
                    <input id="e-url" type="text" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-600 text-sm mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 ml-2 uppercase">Новый ПИН (18+)</label>
                    <input id="p-set" type="text" placeholder="1234" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-600 text-sm text-center font-bold mt-1">
                </div>
                <button onclick="save()" class="w-full bg-blue-600 py-4 rounded-3xl font-black uppercase tracking-widest hover:bg-blue-500 transition shadow-2xl shadow-blue-600/30">Сохранить и запустить</button>
                <button onclick="toggleSet()" class="w-full text-slate-500 text-xs font-bold uppercase mt-2">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        let chs = [];
        let hls = new Hls();
        let currentFocusIdx = 0;
        const proxy = "https://corsproxy.io/?";

        setInterval(() => {
            const d = new Date();
            document.getElementById('h-time').innerText = d.toLocaleTimeString();
            document.getElementById('h-date').innerText = d.toLocaleDateString();
        }, 1000);

        function toggleSet() { document.getElementById('settings').classList.toggle('hidden'); }

        async function save() {
            localStorage.setItem('m3u', document.getElementById('m-url').value);
            localStorage.setItem('epg', document.getElementById('e-url').value);
            localStorage.setItem('pin', document.getElementById('p-set').value || "1234");
            location.reload();
        }

        async function init() {
            const m = localStorage.getItem('m3u');
            const e = localStorage.getItem('epg');
            document.getElementById('m-url').value = m || '';
            document.getElementById('e-url').value = e || '';
            document.getElementById('p-set').value = localStorage.getItem('pin') || '1234';

            if (!m) { toggleSet(); return; }

            try {
                const r = await fetch(proxy + encodeURIComponent(m));
                const text = await r.text();
                parse(text);
            } catch(err) { 
                document.getElementById('list').innerHTML = `<p class="p-10 text-center text-red-500 text-xs">ОШИБКА CORS. Попробуйте другую ссылку или прокси.</p>`;
            }
        }

        function parse(data) {
            const lines = data.split('\n');
            const cats = new Set(["Все категории"]);
            chs = [];
            let cur = null;

            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    const g = l.match(/group-title="([^"]+)"/)?.[1] || "ОБЩИЕ";
                    cats.add(g);
                    cur = {
                        n: l.split(',')[1]?.trim() || "Без имени",
                        g: g,
                        l: l.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        id: l.match(/tvg-id="([^"]+)"/)?.[1] || ""
                    };
                } else if (l.startsWith('http') && cur) {
                    cur.u = l.trim();
                    cur.a = /adult|18\+|xxx|эротика|ero/i.test(cur.g + cur.n);
                    chs.push(cur);
                    cur = null;
                }
            });

            const sel = document.getElementById('cats');
            sel.innerHTML = "";
            cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
            render(chs);
        }

        function render(list) {
            const c = document.getElementById('list');
            c.innerHTML = list.map((item, i) => `
                <div onclick="selectCh(${i})" id="ch-${i}" class="p-4 flex items-center gap-4 cursor-pointer hover:bg-slate-800/40 border-b border-slate-800/20 group transition">
                    <img src="${item.l}" class="w-10 h-10 rounded-lg bg-black object-contain border border-slate-800" onerror="this.src='https://via.placeholder.com/40?text=TV'">
                    <div class="flex-1 overflow-hidden text-left">
                        <div class="text-[13px] font-bold truncate group-hover:text-blue-400 transition uppercase tracking-tighter">${item.n}</div>
                        <div class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">${item.g}</div>
                    </div>
                    ${item.a ? '<span class="text-xs">🔐</span>' : ''}
                </div>
            `).join('');
        }

        function filterList() {
            const g = document.getElementById('cats').value;
            const s = document.getElementById('search').value.toLowerCase();
            const f = chs.filter(i => (g === 'Все категории' || i.g === g) && i.n.toLowerCase().includes(s));
            render(f);
        }

        function handleKeys(e) {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentFocusIdx = Math.min(currentFocusIdx + 1, chs.length - 1);
                highlight(currentFocusIdx);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentFocusIdx = Math.max(currentFocusIdx - 1, 0);
                highlight(currentFocusIdx);
            } else if (e.key === 'Enter') {
                selectCh(currentFocusIdx);
            }
        }

        function highlight(idx) {
            const el = document.getElementById('ch-' + idx);
            if (!el) return;
            document.querySelectorAll('[id^="ch-"]').forEach(i => i.classList.remove('active-ch'));
            el.classList.add('active-ch');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        let selIdx = -1;
        function selectCh(i) {
            selIdx = i;
            highlight(i);
            const item = chs[i];
            if (item.a) { document.getElementById('lock').classList.remove('hidden'); return; }
            start(item.u, item.n);
        }

        function checkPin() {
            if (document.getElementById('pin-in').value === (localStorage.getItem('pin') || "1234")) {
                document.getElementById('lock').classList.add('hidden');
                start(chs[selIdx].u, chs[selIdx].n);
            } else { alert("ОШИБКА"); }
        }

        function start(u, n) {
            document.getElementById('ch-title').innerText = n;
            const v = document.getElementById('tv');
            if (Hls.isSupported()) {
                hls.destroy(); hls = new Hls();
                hls.loadSource(u); hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else { v.src = u; v.play(); }

            // Эмуляция EPG на 3 часа
            const grid = document.getElementById('epg-grid');
            grid.innerHTML = "";
            const now = new Date();
            for(let j=-1; j<3; j++) {
                const t = new Date(now.getTime() + (j * 45 * 60 * 1000));
                grid.innerHTML += `
                    <div class="p-4 rounded-2xl glass ${j===0 ? 'bg-blue-600/10 border-blue-500/50' : 'opacity-40'}">
                        <div class="flex justify-between mb-2">
                            <span class="text-blue-400 font-mono font-bold text-xs">${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}</span>
                            <span class="text-[8px] font-black uppercase tracking-widest px-2 py-1 rounded bg-slate-800">${j<0 ? 'АРХИВ' : (j===0 ? 'СЕЙЧАС' : 'ДАЛЕЕ')}</span>
                        </div>
                        <div class="text-xs font-bold truncate uppercase italic">${n} — Программа ${j+2}</div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
