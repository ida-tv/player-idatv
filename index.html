<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player IDATV - Professional IPTV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 glass sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold tracking-tighter text-blue-500">PLAYER <span class="text-white">IDATV</span></h1>
            <div id="clock" class="hidden md:block text-slate-400 font-mono text-sm border-l border-slate-700 pl-4">
                Загрузка времени...
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleSettings()" class="p-2 hover:bg-slate-700 rounded-full transition">⚙️</button>
        </div>
    </header>

    <main class="flex flex-col lg:flex-row h-[calc(100vh-64px)] overflow-hidden">
        
        <!-- Плеер и EPG -->
        <div class="flex-[3] p-4 overflow-y-auto space-y-4">
            <!-- Видео -->
            <div class="aspect-video bg-black rounded-xl border border-slate-800 shadow-2xl overflow-hidden relative">
                <video id="video" class="w-full h-full" controls></video>
            </div>

            <!-- Программа передач на 3 часа -->
            <div class="glass p-4 rounded-xl border border-slate-800">
                <h3 class="text-blue-400 text-sm font-bold uppercase mb-3">В эфире следующие 3 часа:</h3>
                <div id="epg-list" class="space-y-3">
                    <p class="text-slate-500 text-sm">Выберите канал, чтобы увидеть программу...</p>
                </div>
            </div>
        </div>

        <!-- Список каналов -->
        <aside class="flex-1 border-l border-slate-800 glass overflow-y-auto p-2">
            <div class="p-2 mb-2 font-bold text-sm border-b border-slate-700 flex justify-between">
                <span>СПИСОК КАНАЛОВ</span>
                <span class="text-green-500 text-[10px]">LIVE</span>
            </div>
            <div id="channel-list" class="space-y-1">
                <p class="p-4 text-center text-slate-500 text-sm">Плейлист пуст. Добавьте ссылку в настройках.</p>
            </div>
        </aside>
    </main>

    <!-- Окно настроек -->
    <div id="settings-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-[100]">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Настройки плеера</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Ссылка на M3U плейлист</label>
                    <input id="m3u-url" type="text" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm" placeholder="https://...">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Ссылка на EPG (XMLTV)</label>
                    <input id="epg-url" type="text" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm" placeholder="https://...">
                </div>
                <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-500 p-2 rounded font-bold transition">Сохранить и обновить</button>
                <button onclick="toggleSettings()" class="w-full text-slate-400 text-sm mt-2">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        // Обновление часов
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Управление настройками
        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
        }

        function saveSettings() {
            const url = document.getElementById('m3u-url').value;
            if (url) {
                localStorage.setItem('idatv_m3u', url);
                loadPlaylist(url);
                toggleSettings();
            }
        }

        // Загрузка плейлиста
        async function loadPlaylist(url) {
            try {
                const response = await fetch(url);
                const data = await response.text();
                parseM3U(data);
            } catch (e) {
                alert("Ошибка загрузки плейлиста. Убедитесь, что ссылка правильная и разрешен CORS.");
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];
            let currentChannel = {};

            lines.forEach(line => {
                if (line.startsWith('#EXTINF:')) {
                    currentChannel.name = line.split(',')[1];
                } else if (line.startsWith('http')) {
                    currentChannel.url = line.trim();
                    channels.push({...currentChannel});
                    currentChannel = {};
                }
            });

            const listElem = document.getElementById('channel-list');
            listElem.innerHTML = channels.map(ch => `
                <div onclick="playChannel('${ch.url}', '${ch.name}')" class="p-3 hover:bg-slate-800 rounded-lg cursor-pointer transition text-sm flex items-center gap-3">
                    <div class="w-8 h-8 bg-slate-700 rounded flex items-center justify-center text-[10px]">TV</div>
                    ${ch.name}
                </div>
            `).join('');
        }

        function playChannel(url, name) {
            const video = document.getElementById('video');
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }
    </script>
</body>
</html>
