<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYER IDATV - ULTRA EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: ui-sans-serif, system-ui; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e293b; backdrop-blur: 10px; }
        .ch-active { background: #2563eb !important; border-left: 4px solid #60a5fa; box-shadow: 0 0 20px rgba(37, 99, 235, 0.3); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body onkeydown="handleNav(event)">

    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 glass relative z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black text-blue-500 italic tracking-tighter">PLAYER IDATV</h1>
            <div id="clock" class="text-xs font-mono text-slate-500 border-l border-slate-700 pl-4">00:00:00</div>
        </div>
        <button onclick="openSet()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl text-xs font-bold uppercase transition shadow-lg shadow-blue-600/20">Настройки</button>
    </header>

    <main class="flex h-[calc(100vh-64px)] bg-slate-950">
        <!-- Плеер -->
        <div class="flex-[3] flex flex-col p-6 gap-6 overflow-y-auto">
            <div class="relative aspect-video bg-black rounded-[2rem] border border-slate-800 shadow-2xl overflow-hidden">
                <video id="player" class="w-full h-full" controls autoplay playsinline></video>
                <div id="pin-lock" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center hidden z-50">
                    <p class="mb-4 font-bold text-red-500 uppercase">🔞 Родительский контроль</p>
                    <input id="pin-val" type="password" maxlength="4" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-center text-4xl w-40 outline-none focus:border-blue-500">
                    <button onclick="checkPin()" class="mt-6 bg-blue-600 px-12 py-3 rounded-xl font-bold uppercase">Войти</button>
                </div>
            </div>

            <!-- EPG -->
            <div class="glass p-8 rounded-[2rem]">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="cur-ch-name" class="text-2xl font-bold uppercase italic">Выберите канал</h2>
                        <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">EPG & Архив доступны</p>
                    </div>
                </div>
                <div id="epg-box" class="grid grid-cols-1 md:grid-cols-2 gap-4 opacity-40 italic text-xs">
                    Программа передач подгружается...
                </div>
            </div>
        </div>

        <!-- Список каналов -->
        <aside class="w-[400px] border-l border-slate-800 glass flex flex-col">
            <div class="p-6 border-b border-slate-800 space-y-4">
                <select id="cat-sel" onchange="applyFilters()" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-[10px] font-bold uppercase outline-none"></select>
                <input id="search-in" oninput="applyFilters()" placeholder="ПОИСК (↑ ↓ ENTER)" class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl text-xs outline-none focus:border-blue-500 font-bold uppercase">
            </div>
            <div id="ch-list" class="flex-1 overflow-y-auto">
                <div class="p-20 text-center opacity-20 text-[10px] font-bold uppercase tracking-widest leading-loose">Список пуст</div>
            </div>
        </aside>
    </main>

    <!-- Модалка -->
    <div id="set-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[100] p-4">
        <div class="bg-slate-900 border border-slate-700 p-10 rounded-[3rem] w-full max-w-lg">
            <h2 class="text-2xl font-black mb-8 text-blue-500 uppercase tracking-tighter italic text-center">Конфигурация</h2>
            <div class="space-y-4">
                <input id="url-m3u" type="text" placeholder="Ссылка на плейлист (M3U)" class="w-full bg-slate-800 p-4 rounded-2xl outline-none border border-slate-700 focus:border-blue-500 text-sm">
                <input id="url-epg" type="text" placeholder="Ссылка на программу (XMLTV)" class="w-full bg-slate-800 p-4 rounded-2xl outline-none border border-slate-700 focus:border-blue-500 text-sm">
                <input id="val-pin" type="text" placeholder="ПИН-код (1234)" class="w-full bg-slate-800 p-4 rounded-2xl text-center font-bold">
                <button onclick="saveSet()" class="w-full bg-blue-600 py-4 rounded-3xl font-black uppercase tracking-widest hover:bg-blue-500 transition">Запустить</button>
                <button onclick="openSet()" class="w-full text-slate-500 text-[10px] font-bold uppercase mt-2">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        let channels = [];
        let hls = new Hls();
        let currentIdx = 0;
        const proxies = [
            "https://api.allorigins.win/raw?url=",
            "https://thingproxy.freeboard.io/fetch/",
            "https://cors-anywhere.herokuapp.com/"
        ];

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function openSet() { document.getElementById('set-modal').classList.toggle('hidden'); }

        async function saveSet() {
            localStorage.setItem('m3u', document.getElementById('url-m3u').value);
            localStorage.setItem('epg', document.getElementById('url-epg').value);
            localStorage.setItem('pin', document.getElementById('val-pin').value || "1234");
            location.reload();
        }

        async function boot() {
            const m = localStorage.getItem('m3u');
            document.getElementById('url-m3u').value = m || '';
            document.getElementById('url-epg').value = localStorage.getItem('epg') || '';
            document.getElementById('val-pin').value = localStorage.getItem('pin') || '1234';

            if (!m) { openSet(); return; }

            let loaded = false;
            for (let p of proxies) {
                try {
                    const res = await fetch(p + encodeURIComponent(m));
                    if (res.ok) { parse(await res.text()); loaded = true; break; }
                } catch(e) {}
            }
            if (!loaded) alert("Ошибка загрузки. Попробуйте другой плейлист.");
        }

        function parse(data) {
            const lines = data.split('\n');
            const cats = new Set(["Все категории"]);
            channels = [];
            let cur = null;

            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    const g = l.match(/group-title="([^"]+)"/)?.[1] || "ОБЩИЕ";
                    cats.add(g);
                    cur = {
                        n: l.split(',')[1]?.trim() || "Без имени",
                        g: g,
                        l: l.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        a: /adult|18\+|xxx/i.test(g + l)
                    };
                } else if (l.startsWith('http') && cur) {
                    cur.u = l.trim();
                    channels.push({...cur});
                    cur = null;
                }
            });

            const s = document.getElementById('cat-sel');
            cats.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
            draw(channels);
        }

        function draw(list) {
            const c = document.getElementById('ch-list');
            c.innerHTML = list.map((item, i) => `
                <div onclick="select(${i})" id="ch-${i}" class="p-4 flex items-center gap-4 cursor-pointer hover:bg-slate-800 transition border-b border-slate-800/10 group">
                    <img src="${item.l}" class="w-10 h-10 rounded-lg bg-black object-contain border border-slate-800" onerror="this.src='https://via.placeholder.com/40'">
                    <div class="flex-1 overflow-hidden">
                        <div class="text-[13px] font-bold truncate uppercase italic tracking-tighter">${item.n}</div>
                        <div class="text-[9px] text-slate-500 font-bold uppercase mt-1 leading-none">${item.g}</div>
                    </div>
                </div>
            `).join('');
        }

        function handleNav(e) {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowDown') { e.preventDefault(); currentIdx = Math.min(currentIdx + 1, channels.length - 1); focus(currentIdx); }
            if (e.key === 'ArrowUp') { e.preventDefault(); currentIdx = Math.max(currentIdx - 1, 0); focus(currentIdx); }
            if (e.key === 'Enter') select(currentIdx);
        }

        function focus(i) {
            document.querySelectorAll('[id^="ch-"]').forEach(el => el.classList.remove('ch-active'));
            const el = document.getElementById('ch-'+i);
            if(el) { el.classList.add('ch-active'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }

        let selIdx = -1;
        function select(i) {
            selIdx = i; focus(i);
            const item = channels[i];
            if (item.a) { document.getElementById('pin-lock').classList.remove('hidden'); return; }
            start(item.u, item.n);
        }

        function checkPin() {
            if (document.getElementById('pin-val').value === (localStorage.getItem('pin') || "1234")) {
                document.getElementById('pin-lock').classList.add('hidden');
                start(channels[selIdx].u, channels[selIdx].name);
            } else alert("НЕВЕРНО");
        }

        function start(u, n) {
            document.getElementById('cur-ch-name').innerText = n;
            const v = document.getElementById('player');
            if (Hls.isSupported()) {
                hls.destroy(); hls = new Hls();
                hls.loadSource(u); hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else { v.src = u; v.play(); }

            // Эмуляция программы
            const box = document.getElementById('epg-box');
            box.innerHTML = "";
            const now = new Date();
            for(let j=-1; j<3; j++) {
                const t = new Date(now.getTime() + (j * 45 * 60 * 1000));
                box.innerHTML += `
                    <div class="p-4 rounded-2xl glass ${j===0 ? 'bg-blue-600/10 border-blue-500/50' : 'opacity-40'} transition">
                        <div class="flex justify-between mb-2 uppercase font-black text-[9px]">
                            <span class="text-blue-400">${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}</span>
                            <span>${j<0 ? 'Архив' : (j===0 ? 'Эфир' : 'Далее')}</span>
                        </div>
                        <div class="text-[11px] font-bold truncate uppercase tracking-tighter">${n} — Шоу ${j+2}</div>
                    </div>
                `;
            }
        }

        function applyFilters() {
            const g = document.getElementById('cat-sel').value;
            const s = document.getElementById('search-in').value.toLowerCase();
            const f = channels.filter(i => (g === 'Все категории' || i.g === g) && i.n.toLowerCase().includes(s));
            draw(f);
        }

        boot();
    </script>
</body>
</html>
