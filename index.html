<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Player IDATV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { margin: 0; }
</style>
</head>

<body class="bg-gray-900 text-white">

<!-- HEADER -->
<div class="flex justify-between items-center p-3 bg-black">
  <div class="text-xl font-bold">Player IDATV</div>
  <div id="time" class="text-sm"></div>
</div>

<!-- MAIN -->
<div class="flex h-[calc(100vh-60px)]">

  <!-- SIDEBAR -->
  <div class="w-64 bg-gray-800 overflow-y-auto">

    <div class="p-2">
      <input id="m3uInput" placeholder="Ссылка M3U"
        class="w-full p-2 text-black rounded mb-2">
      <button onclick="loadM3U()"
        class="w-full bg-blue-600 p-2 rounded">Загрузить</button>
    </div>

    <div id="groups" class="p-2 border-t border-gray-700"></div>

  </div>

  <!-- CONTENT -->
  <div class="flex-1 flex flex-col">

    <!-- PLAYER -->
    <video id="player" controls class="w-full h-[300px] bg-black"></video>

    <!-- INFO -->
    <div class="p-3 bg-gray-800">
      <div id="nowTitle" class="font-bold">Выберите канал</div>
      <div id="epgNow" class="text-sm text-gray-400"></div>
    </div>

    <!-- CHANNELS -->
    <div id="channels" class="flex-1 overflow-y-auto"></div>

  </div>

</div>

<script>
const video = document.getElementById('player');

let channels = [];
let currentGroup = "Все";
let epgData = [];

// ▶️ Воспроизведение
function play(url, name) {
  document.getElementById("nowTitle").innerText = name;

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

// 📺 Загрузка M3U
function loadM3U() {
  const url = document.getElementById('m3uInput').value;

  fetch(url)
    .then(res => res.text())
    .then(data => {
      const lines = data.split('\n');
      channels = [];

      for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith('#EXTINF')) {
          const name = lines[i].split(',')[1];
          const link = lines[i + 1];

          const groupMatch = lines[i].match(/group-title="(.*?)"/);
          const group = groupMatch ? groupMatch[1] : "Другие";

          channels.push({ name, link, group });
        }
      }

      renderGroups();
      renderChannels();
    });
}

// 📂 Группы
function renderGroups() {
  const groupsDiv = document.getElementById("groups");
  const groups = ["Все", ...new Set(channels.map(c => c.group))];

  groupsDiv.innerHTML = "";

  groups.forEach(g => {
    const div = document.createElement("div");
    div.innerText = g;
    div.className = "p-2 cursor-pointer hover:bg-gray-700";

    div.onclick = () => {
      currentGroup = g;
      renderChannels();
    };

    groupsDiv.appendChild(div);
  });
}

// 📺 Каналы
function renderChannels() {
  const container = document.getElementById("channels");
  container.innerHTML = "";

  const filtered = currentGroup === "Все"
    ? channels
    : channels.filter(c => c.group === currentGroup);

  filtered.forEach(c => {
    const div = document.createElement("div");

    div.className = "flex justify-between p-3 border-b border-gray-700 hover:bg-gray-800 cursor-pointer";

    div.innerHTML = `
      <span>${c.name}</span>
      <button onclick="event.stopPropagation(); toggleFav('${c.name}','${c.link}')">⭐</button>
    `;

    div.onclick = () => play(c.link, c.name);

    container.appendChild(div);
  });
}

// ⭐ Избранное
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

function toggleFav(name, url) {
  const i = favorites.findIndex(f => f.url === url);

  if (i === -1) {
    favorites.push({ name, url });
  } else {
    favorites.splice(i, 1);
  }

  localStorage.setItem("fav", JSON.stringify(favorites));
}

// 🕒 Время
function updateTime() {
  const now = new Date();

  document.getElementById("time").innerText =
    now.toLocaleString('ru-RU', {
      day: 'numeric',
      month: 'short',
      hour: '2-digit',
      minute: '2-digit'
    });
}

setInterval(updateTime, 1000);
updateTime();

</script>

</body>
</html>
