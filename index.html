<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player IDATV - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.95); border: 1px solid #1e293b; }
        .active-chan { background: #1e3a8a !important; border-left: 4px solid #3b82f6; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; }
    </style>
</head>
<body>

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-6 glass">
        <h1 class="text-xl font-bold text-blue-500">PLAYER <span class="text-white">IDATV</span></h1>
        <div id="clock" class="text-xs font-mono text-slate-400">00:00:00</div>
        <button onclick="document.getElementById('settings').classList.toggle('hidden')" class="p-2">⚙️</button>
    </header>

    <main class="flex h-[calc(100vh-56px)] flex-col lg:flex-row">
        <!-- Плеер -->
        <div class="flex-[3] flex flex-col p-4 gap-4 overflow-y-auto">
            <div class="aspect-video bg-black rounded-2xl border border-slate-800 overflow-hidden relative">
                <video id="player" class="w-full h-full" controls autoplay></video>
                <div id="pin-screen" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center hidden z-50">
                    <p class="mb-4">Введите ПИН для 18+</p>
                    <input id="pin-input" type="password" class="bg-slate-800 p-2 rounded text-center">
                    <button onclick="checkPin()" class="mt-4 bg-blue-600 px-4 py-2 rounded">ОТКРЫТЬ</button>
                </div>
            </div>
            
            <div class="glass p-4 rounded-xl">
                <h2 id="cur-title" class="font-bold text-blue-400">Программа передач (Архив 3 дня)</h2>
                <div id="epg-list" class="mt-4 space-y-2 text-sm opacity-70">
                    <!-- Программа -->
                </div>
            </div>
        </div>

        <!-- Каналы -->
        <aside class="w-full lg:w-[350px] border-l border-slate-800 glass flex flex-col">
            <div class="p-4 border-b border-slate-800 space-y-2">
                <select id="cat-sel" onchange="filter()" class="w-full bg-slate-800 p-2 rounded text-xs"></select>
                <input id="search" oninput="filter()" placeholder="Поиск..." class="w-full bg-slate-900 p-2 rounded text-xs">
            </div>
            <div id="ch-list" class="flex-1 overflow-y-auto"></div>
        </aside>
    </main>

    <!-- Настройки -->
    <div id="settings" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[100]">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-md border border-slate-700">
            <h2 class="text-xl font-bold mb-6 text-blue-500">Настройки</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-500 block mb-1">ВАРИАНТ 1: Ссылка на плейлист</label>
                    <input id="m-url" type="text" class="w-full bg-slate-800 p-3 rounded text-sm" placeholder="https://...">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 block mb-1">ВАРИАНТ 2: Загрузить файл .m3u с ПК</label>
                    <input type="file" id="file-input" accept=".m3u,.m3u8" class="text-xs text-slate-400">
                </div>
                <hr class="border-slate-800">
                <input id="p-set" type="text" placeholder="Установить ПИН (1234)" class="w-full bg-slate-800 p-3 rounded text-sm">
                <button onclick="save()" class="w-full bg-blue-600 py-3 rounded font-bold">СОХРАНИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        let channels = [];
        let engine = new Hls();

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function save() {
            localStorage.setItem('m_link', document.getElementById('m-url').value);
            localStorage.setItem('pin_code', document.getElementById('p-set').value || "1234");
            
            const file = document.getElementById('file-input').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('local_m3u', e.target.result);
                    location.reload();
                };
                reader.readAsText(file);
            } else {
                location.reload();
            }
        }

        async function init() {
            const link = localStorage.getItem('m_link');
            const local = localStorage.getItem('local_m3u');
            
            if (local) {
                parse(local);
            } else if (link) {
                try {
                    const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(link));
                    const t = await r.text();
                    parse(t);
                } catch(e) { alert("Ошибка ссылки. Попробуйте загрузить плейлист ФАЙЛОМ в настройках."); }
            } else {
                document.getElementById('settings').classList.remove('hidden');
            }
        }

        function parse(data) {
            const lines = data.split('\n');
            const cats = new Set(["Все категории"]);
            channels = [];
            let cur = null;

            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    const g = l.match(/group-title="([^"]+)"/)?.[1] || "Разное";
                    cats.add(g);
                    cur = {
                        name: l.split(',')[1]?.trim(),
                        group: g,
                        logo: l.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        id: l.match(/tvg-id="([^"]+)"/)?.[1] || ""
                    };
                } else if (l.startsWith('http')) {
                    cur.url = l.trim();
                    cur.adult = /adult|18\+|xxx|ero/i.test(cur.group + cur.name);
                    channels.push(cur);
                }
            });

            const sel = document.getElementById('cat-sel');
            cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
            render(channels);
        }

        function render(list) {
            const c = document.getElementById('ch-list');
            c.innerHTML = list.map((item, i) => `
                <div onclick="play(${i})" id="ch-${i}" class="p-3 border-b border-slate-800 cursor-pointer flex items-center gap-3 hover:bg-slate-900 transition">
                    <img src="${item.logo}" class="w-8 h-8 rounded bg-black object-contain" onerror="this.src='https://via.placeholder.com/30'">
                    <div class="flex-1 overflow-hidden">
                        <div class="text-sm font-bold truncate">${item.name}</div>
                        <div class="text-[10px] text-slate-500 uppercase">${item.group}</div>
                    </div>
                    ${item.adult ? '<span>🔐</span>' : ''}
                </div>
            `).join('');
        }

        function filter() {
            const g = document.getElementById('cat-sel').value;
            const s = document.getElementById('search').value.toLowerCase();
            const f = channels.filter(c => (g === 'Все категории' || c.group === g) && c.name.toLowerCase().includes(s));
            render(f);
        }

        let selIdx = -1;
        function play(i) {
            selIdx = i;
            const ch = channels[i];
            document.querySelectorAll('[id^="ch-"]').forEach(e => e.classList.remove('active-chan'));
            document.getElementById('ch-'+i).classList.add('active-chan');
            
            if (ch.adult) {
                document.getElementById('pin-screen').classList.remove('hidden');
                return;
            }
            start(ch.url, ch.name);
        }

        function checkPin() {
            if (document.getElementById('pin-input').value === (localStorage.getItem('pin_code') || "1234")) {
                document.getElementById('pin-screen').classList.add('hidden');
                start(channels[selIdx].url, channels[selIdx].name);
            } else { alert("НЕВЕРНО"); }
        }

        function start(url, name) {
            document.getElementById('cur-title').innerText = name + " (Прямой эфир)";
            const v = document.getElementById('player');
            if (Hls.isSupported()) {
                engine.destroy(); engine = new Hls();
                engine.loadSource(url); engine.attachMedia(v);
                engine.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else { v.src = url; v.play(); }

            // Эмуляция архива
            const el = document.getElementById('epg-list');
            el.innerHTML = "";
            for(let i=1; i<5; i++) {
                el.innerHTML += `<div class="p-2 border-l-2 border-slate-700">Передача ${i} — запись за вчера</div>`;
            }
        }

        init();
    </script>
</body>
</html>
