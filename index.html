<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYER IDATV - CORE ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background: #010409; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; }
        .ui-panel { background: rgba(13, 17, 23, 0.95); border: 1px solid #30363d; }
        .channel-active { background: #1f6feb !important; border-left: 5px solid #58a6ff; box-shadow: 0 0 20px rgba(31, 111, 235, 0.3); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #8b949e; border-radius: 10px; }
        .loading-bar { animation: progress 2s infinite linear; background: linear-gradient(90deg, transparent, #58a6ff, transparent); background-size: 200% 100%; }
        @keyframes progress { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body onkeydown="navigate(event)">

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <header class="h-16 border-b border-[#30363d] flex items-center justify-between px-8 ui-panel relative z-50">
        <div class="flex items-center gap-6">
            <h1 class="text-2xl font-black text-[#58a6ff] tracking-tighter italic">PLAYER IDATV</h1>
            <div id="clock" class="text-sm font-mono text-[#8b949e] border-l border-[#30363d] pl-6 uppercase">00:00:00</div>
        </div>
        <div class="flex gap-4">
            <div id="status-led" class="flex items-center gap-2 text-[10px] font-bold text-[#8b949e] uppercase">
                <div class="w-2 h-2 rounded-full bg-red-500"></div> Системная готовность
            </div>
            <button onclick="openSettings()" class="bg-[#21262d] hover:bg-[#30363d] border border-[#30363d] px-6 py-2 rounded-xl text-xs font-bold transition uppercase">Настройки</button>
        </div>
    </header>

    <main class="flex h-[calc(100vh-64px)] bg-[#010409]">
        <!-- ПЛЕЕР И ПРОГРАММА -->
        <div class="flex-[3] flex flex-col p-6 gap-6 overflow-y-auto">
            <div class="relative aspect-video bg-black rounded-[2.5rem] border border-[#30363d] shadow-2xl overflow-hidden group">
                <video id="main-video" class="w-full h-full" controls autoplay playsinline></video>
                <!-- LOCK SCREEN -->
                <div id="adult-lock" class="absolute inset-0 bg-[#0d1117] flex flex-col items-center justify-center hidden z-50">
                    <div class="text-6xl mb-6">🔒</div>
                    <h2 class="text-xl font-bold mb-8 uppercase tracking-widest text-[#f85149]">Родительский контроль</h2>
                    <input id="pin-field" type="password" maxlength="4" placeholder="••••" class="bg-[#161b22] border border-[#30363d] p-5 rounded-2xl text-center text-4xl w-48 outline-none focus:border-[#58a6ff]">
                    <button onclick="verifyPin()" class="mt-8 bg-[#238636] hover:bg-[#2ea043] px-16 py-4 rounded-2xl font-bold uppercase transition">Разблокировать</button>
                </div>
            </div>

            <!-- ИНФО-БЛОК -->
            <div class="ui-panel p-8 rounded-[2.5rem]">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="view-ch-name" class="text-2xl font-bold text-white uppercase tracking-tight">Выберите канал из списка</h2>
                        <p id="view-ch-cat" class="text-xs text-[#8b949e] font-bold uppercase mt-2 tracking-widest italic">EPG & Архив 3 дня</p>
                    </div>
                    <span class="bg-[#1f6feb] text-[10px] font-black px-4 py-1.5 rounded-full uppercase italic">Interactive Mode</span>
                </div>
                <div id="epg-display" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Сетка программ -->
                </div>
            </div>
        </div>

        <!-- СПИСОК КАНАЛОВ -->
        <aside class="w-[450px] border-l border-[#30363d] ui-panel flex flex-col">
            <div class="p-6 border-b border-[#30363d] space-y-4">
                <select id="ui-cats" onchange="applyFilters()" class="w-full bg-[#161b22] border border-[#30363d] p-3 rounded-xl text-[10px] font-black uppercase outline-none focus:border-[#58a6ff] cursor-pointer"></select>
                <div class="relative">
                    <input id="ui-search" oninput="applyFilters()" placeholder="ПОИСК ПО КАНАЛАМ..." class="w-full bg-[#0d1117] border border-[#30363d] p-4 rounded-xl text-xs outline-none focus:border-[#58a6ff] uppercase font-bold tracking-widest">
                </div>
            </div>
            <div id="channel-list" class="flex-1 overflow-y-auto">
                <div class="p-20 text-center opacity-20 text-xs font-bold uppercase italic leading-loose">Плейлист пуст</div>
            </div>
        </aside>
    </main>

    <!-- МОДАЛКА НАСТРОЕК -->
    <div id="modal-settings" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-[100] backdrop-blur-sm">
        <div class="bg-[#161b22] border border-[#30363d] p-10 rounded-[3rem] w-full max-w-xl shadow-3xl">
            <h2 class="text-3xl font-black mb-10 text-[#58a6ff] uppercase tracking-tighter italic text-center">Конфигурация IDATV</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-[#8b949e] ml-2 uppercase">Источник (M3U URL)</label>
                    <input id="set-m3u" type="text" class="w-full bg-[#0d1117] border border-[#30363d] p-4 rounded-2xl outline-none focus:border-[#58a6ff] text-sm mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-[#8b949e] ml-2 uppercase">Программа (EPG URL)</label>
                    <input id="set-epg" type="text" class="w-full bg-[#0d1117] border border-[#30363d] p-4 rounded-2xl outline-none focus:border-[#58a6ff] text-sm mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-[#8b949e] ml-2 uppercase">ПИН-код защиты (18+)</label>
                    <input id="set-pin" type="text" placeholder="1234" class="w-full bg-[#0d1117] border border-[#30363d] p-4 rounded-2xl text-center font-bold tracking-widest mt-1 outline-none">
                </div>
                <button onclick="commitSettings()" class="w-full bg-[#238636] hover:bg-[#2ea043] py-5 rounded-3xl font-black uppercase tracking-[0.2em] shadow-xl transition">Сохранить и запустить</button>
                <button onclick="openSettings()" class="w-full text-[#8b949e] text-[10px] font-bold uppercase mt-2">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        let hlsEngine = new Hls();
        let navIdx = 0;
        const cors = "https://corsproxy.io/?";

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function openSettings() { document.getElementById('modal-settings').classList.toggle('hidden'); }

        async function commitSettings() {
            localStorage.setItem('core_m3u', document.getElementById('set-m3u').value);
            localStorage.setItem('core_epg', document.getElementById('set-epg').value);
            localStorage.setItem('core_pin', document.getElementById('set-pin').value || "1234");
            location.reload();
        }

        async function boot() {
            const m = localStorage.getItem('core_m3u');
            document.getElementById('set-m3u').value = m || '';
            document.getElementById('set-epg').value = localStorage.getItem('core_epg') || '';
            document.getElementById('set-pin').value = localStorage.getItem('core_pin') || '1234';

            if (!m) { openSettings(); return; }

            document.getElementById('status-led').innerHTML = '<div class="w-2 h-2 rounded-full bg-yellow-500"></div> Загрузка каналов...';
            try {
                const res = await fetch(cors + encodeURIComponent(m));
                const text = await res.text();
                parse(text);
                document.getElementById('status-led').innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500"></div> Система онлайн';
            } catch(e) {
                document.getElementById('status-led').innerHTML = '<div class="w-2 h-2 rounded-full bg-red-500"></div> Ошибка доступа';
            }
        }

        function parse(raw) {
            const lines = raw.split('\n');
            const cats = new Set(["Все категории"]);
            db = [];
            let item = null;

            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    const g = l.match(/group-title="([^"]+)"/)?.[1] || "ОБЩИЕ";
                    cats.add(g);
                    item = {
                        n: l.split(',')[1]?.trim() || "Unknown Channel",
                        g: g,
                        l: l.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        a: /adult|18\+|xxx/i.test(g + l)
                    };
                } else if (l.startsWith('http') && item) {
                    item.u = l.trim();
                    db.push({...item});
                    item = null;
                }
            });

            const s = document.getElementById('ui-cats');
            cats.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
            display(db);
        }

        function display(list) {
            const c = document.getElementById('channel-list');
            c.innerHTML = list.map((ch, i) => `
                <div onclick="tune(${i})" id="ch-${i}" class="p-5 flex items-center gap-5 cursor-pointer hover:bg-[#161b22] border-b border-[#30363d]/30 transition group">
                    <img src="${ch.l}" class="w-12 h-12 rounded-xl bg-black object-contain border border-[#30363d] group-hover:border-[#58a6ff] transition" onerror="this.src='https://via.placeholder.com/60?text=TV'">
                    <div class="flex-1 overflow-hidden">
                        <div class="text-[14px] font-bold truncate group-hover:text-[#58a6ff] transition uppercase italic tracking-tight">${ch.n}</div>
                        <div class="text-[9px] text-[#8b949e] font-black uppercase mt-1 tracking-widest">${ch.g}</div>
                    </div>
                </div>
            `).join('');
        }

        function navigate(e) {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowDown') { e.preventDefault(); navIdx = Math.min(navIdx + 1, db.length - 1); focus(navIdx); }
            if (e.key === 'ArrowUp') { e.preventDefault(); navIdx = Math.max(navIdx - 1, 0); focus(navIdx); }
            if (e.key === 'Enter') tune(navIdx);
        }

        function focus(i) {
            document.querySelectorAll('[id^="ch-"]').forEach(el => el.classList.remove('channel-active'));
            const el = document.getElementById('ch-' + i);
            if(el) { el.classList.add('channel-active'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }

        let sel = -1;
        function tune(i) {
            sel = i; navIdx = i; focus(i);
            const item = db[i];
            if (item.a) { document.getElementById('adult-lock').classList.remove('hidden'); return; }
            play(item.u, item.n, item.g);
        }

        function verifyPin() {
            if (document.getElementById('pin-field').value === (localStorage.getItem('core_pin') || "1234")) {
                document.getElementById('adult-lock').classList.add('hidden');
                play(db[sel].u, db[sel].n, db[sel].g);
            } else alert("ОШИБКА");
        }

        function play(u, n, g) {
            document.getElementById('view-ch-name').innerText = n;
            document.getElementById('view-ch-cat').innerText = g;
            const v = document.getElementById('main-video');
            if (Hls.isSupported()) {
                hlsEngine.destroy(); hlsEngine = new Hls();
                hlsEngine.loadSource(u); hlsEngine.attachMedia(v);
                hlsEngine.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else { v.src = u; v.play(); }

            // ГЕНЕРАЦИЯ EPG (ИМИТАЦИЯ)
            const grid = document.getElementById('epg-display');
            grid.innerHTML = "";
            const now = new Date();
            for(let j=-1; j<3; j++) {
                const t = new Date(now.getTime() + (j * 50 * 60 * 1000));
                grid.innerHTML += `
                    <div class="p-5 rounded-3xl ui-panel ${j===0 ? 'bg-[#1f6feb]/10 border-[#58a6ff]/50' : 'opacity-40'} transition">
                        <div class="flex justify-between mb-2 uppercase font-black text-[10px]">
                            <span class="text-[#58a6ff]">${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}</span>
                            <span>${j<0 ? 'Архив' : (j===0 ? 'Эфир' : 'Далее')}</span>
                        </div>
                        <div class="text-[12px] font-bold truncate uppercase italic text-white">${n} — Выпуск ${j+2}</div>
                    </div>
                `;
            }
        }

        function applyFilters() {
            const g = document.getElementById('ui-cats').value;
            const s = document.getElementById('ui-search').value.toLowerCase();
            const f = db.filter(i => (g === 'Все категории' || i.g === g) && i.n.toLowerCase().includes(s));
            display(f);
        }

        boot();
    </script>
</body>
</html>
