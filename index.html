<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player IDATV - Stream TV Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .active-ch { background: linear-gradient(90deg, #1d4ed8 0%, transparent 100%); border-left: 4px solid #3b82f6; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .player-shadow { shadow-2xl shadow-blue-500/20; }
    </style>
</head>
<body>

    <!-- Шапка с часами -->
    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 glass sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <h1 class="text-2xl font-black text-blue-500 italic tracking-tighter uppercase">Player <span class="text-white">IDATV</span></h1>
            <div class="hidden md:flex flex-col border-l border-slate-700 pl-6 leading-none">
                <span id="h-time" class="text-lg font-bold text-white tracking-widest">00:00:00</span>
                <span id="h-date" class="text-[10px] text-slate-500 uppercase font-bold mt-1">02 мая 2026</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="loader" class="hidden w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <button onclick="toggleConfig()" class="w-10 h-10 flex items-center justify-center hover:bg-slate-800 rounded-xl transition text-xl">⚙️</button>
        </div>
    </header>

    <main class="flex h-[calc(100vh-64px)] flex-col lg:row">
        <!-- Левая часть: Плеер и Программа -->
        <div class="flex-[3] flex flex-col p-4 gap-4 overflow-y-auto bg-slate-950">
            <div class="relative aspect-video bg-black rounded-[2rem] border border-slate-800 player-shadow overflow-hidden group">
                <video id="tv-player" class="w-full h-full" controls autoplay playsinline></video>
                <!-- Lock Screen -->
                <div id="lock" class="absolute inset-0 bg-slate-900/98 flex flex-col items-center justify-center hidden z-50 backdrop-blur-xl">
                    <span class="text-7xl mb-6">🔞</span>
                    <h2 class="text-xl font-bold mb-6 tracking-widest uppercase">Родительский контроль</h2>
                    <input id="pin-in" type="password" maxlength="4" placeholder="ПИН" class="bg-slate-800 border border-slate-700 p-4 rounded-2xl text-center text-3xl w-40 outline-none focus:border-blue-500 tracking-[0.5em]">
                    <button onclick="checkPin()" class="mt-6 bg-blue-600 px-12 py-3 rounded-2xl font-black hover:bg-blue-500 transition shadow-lg shadow-blue-600/30">РАЗБЛОКИРОВАТЬ</button>
                </div>
            </div>

            <!-- EPG Блок -->
            <div class="glass p-6 rounded-[2rem]">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h2 id="cur-chan" class="text-2xl font-black italic text-white uppercase tracking-tighter leading-none">Выберите канал</h2>
                        <p id="cur-desc" class="text-xs text-slate-500 mt-2 font-bold uppercase tracking-widest">Прямой эфир • Архив за 3 дня</p>
                    </div>
                    <span class="bg-blue-600 px-3 py-1 rounded-lg text-[10px] font-black italic tracking-widest">STREAM TV</span>
                </div>
                <div id="epg-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Программа передач генерируется здесь -->
                </div>
            </div>
        </div>

        <!-- Правая часть: Каналы -->
        <aside class="w-full lg:w-[420px] border-l border-slate-800 glass flex flex-col">
            <div class="p-4 border-b border-slate-800 space-y-3 bg-slate-900/40">
                <select id="cat-list" onchange="filterList()" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-2xl text-xs font-bold uppercase tracking-widest outline-none cursor-pointer hover:border-blue-500 transition"></select>
                <input type="text" id="search" oninput="filterList()" placeholder="Поиск телеканала..." class="w-full bg-slate-950 border border-slate-800 p-3 rounded-2xl text-sm outline-none focus:border-blue-600 transition">
            </div>
            <div id="chan-list" class="flex-1 overflow-y-auto divide-y divide-slate-800/30">
                <!-- Список каналов -->
            </div>
        </aside>
    </main>

    <!-- Окно настроек -->
    <div id="config-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[100] p-4 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-[2.5rem] w-full max-w-lg shadow-3xl">
            <h2 class="text-3xl font-black mb-8 italic text-blue-500 tracking-tighter uppercase text-center">Config IDATV</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-500 ml-2 uppercase tracking-widest">M3U/M3U8 Плейлист</label>
                    <input id="m-url" type="text" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-600 transition text-sm mt-1 border border-slate-700">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 ml-2 uppercase tracking-widest">ПИН-код (18+)</label>
                    <input id="p-setup" type="text" placeholder="По умолчанию 1234" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-600 transition text-center font-bold tracking-[0.5em] mt-1 border border-slate-700">
                </div>
                <button onclick="saveSettings()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-sm tracking-[0.3em] uppercase shadow-2xl shadow-blue-600/30 hover:bg-blue-500 transition active:scale-95">Сохранить и запустить</button>
                <button onclick="toggleConfig()" class="w-full text-slate-600 text-xs font-bold uppercase tracking-widest">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        let channels = [];
        let hlsEngine = new Hls();
        const corsGateway = "https://corsproxy.io/?";

        // Время
        setInterval(() => {
            const d = new Date();
            document.getElementById('h-time').innerText = d.toLocaleTimeString();
        }, 1000);

        function toggleConfig() { document.getElementById('config-modal').classList.toggle('hidden'); }

        async function saveSettings() {
            localStorage.setItem('idatv_m3u', document.getElementById('m-url').value);
            localStorage.setItem('idatv_pin', document.getElementById('p-setup').value || "1234");
            location.reload();
        }

        async function init() {
            const m = localStorage.getItem('idatv_m3u');
            document.getElementById('m-url').value = m || '';
            document.getElementById('p-setup').value = localStorage.getItem('idatv_pin') || '1234';

            if (!m) { toggleConfig(); return; }

            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(corsGateway + encodeURIComponent(m));
                const data = await res.text();
                parsePlaylist(data);
            } catch(e) {
                alert("Ошибка доступа к плейлисту. Проверьте ссылку!");
            }
            document.getElementById('loader').classList.add('hidden');
        }

        function parsePlaylist(data) {
            const lines = data.split('\n');
            const groups = new Set(["Все категории"]);
            channels = [];
            let current = null;

            lines.forEach(line => {
                if (line.startsWith('#EXTINF:')) {
                    const groupName = line.match(/group-title="([^"]+)"/)?.[1] || "ОБЩИЕ";
                    groups.add(groupName);
                    current = {
                        name: line.split(',')[1]?.trim() || "TV Channel",
                        group: groupName,
                        logo: line.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        id: line.match(/tvg-id="([^"]+)"/)?.[1] || ""
                    };
                } else if (line.startsWith('http')) {
                    current.url = line.trim();
                    current.adult = /adult|18\+|xxx|эротика|ero/i.test(current.group + current.name);
                    channels.push(current);
                }
            });

            const select = document.getElementById('cat-list');
            groups.forEach(g => select.innerHTML += `<option value="${g}">${g}</option>`);
            renderChannels(channels);
        }

        function renderChannels(list) {
            const container = document.getElementById('chan-list');
            container.innerHTML = list.map((ch, i) => `
                <div onclick="playChannel(${i})" id="ch-${i}" class="p-4 flex items-center gap-4 cursor-pointer hover:bg-slate-800/40 transition border-b border-slate-800/20 group">
                    <div class="relative flex-shrink-0">
                        <img src="${ch.logo}" class="w-11 h-11 rounded-xl bg-black object-contain border border-slate-700 group-hover:border-blue-500 transition" onerror="this.src='https://via.placeholder.com/60?text=TV'">
                        ${ch.adult ? '<span class="absolute -top-1 -right-1 text-[8px] bg-red-600 p-1 rounded-full">🔞</span>' : ''}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="text-sm font-black truncate uppercase tracking-tighter group-hover:text-blue-400 transition">${ch.name}</div>
                        <div class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">${ch.group}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterList() {
            const g = document.getElementById('cat-list').value;
            const s = document.getElementById('search').value.toLowerCase();
            const f = channels.filter(c => (g === 'Все категории' || c.group === g) && c.name.toLowerCase().includes(s));
            renderChannels(f);
        }

        let currentIdx = -1;
        function playChannel(i) {
            currentIdx = i;
            const ch = channels[i];
            document.querySelectorAll('[id^="ch-"]').forEach(el => el.classList.remove('active-ch'));
            document.getElementById('ch-'+i).classList.add('active-ch');

            if (ch.adult) {
                document.getElementById('lock').classList.remove('hidden');
                return;
            }
            startMedia(ch.url, ch.name);
        }

        function checkPin() {
            const userPin = document.getElementById('pin-in').value;
            const savedPin = localStorage.getItem('idatv_pin') || "1234";
            if (userPin === savedPin) {
                document.getElementById('lock').classList.add('hidden');
                startMedia(channels[currentIdx].url, channels[currentIdx].name);
            } else { alert("НЕВЕРНЫЙ ПИН!"); }
        }

        function startMedia(url, name) {
            document.getElementById('cur-chan').innerText = name;
            const video = document.getElementById('tv-player');
            if (Hls.isSupported()) {
                hlsEngine.destroy();
                hlsEngine = new Hls();
                hlsEngine.loadSource(url);
                hlsEngine.attachMedia(video);
                hlsEngine.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else { video.src = url; video.play(); }

            // Эмуляция сетки передач
            const grid = document.getElementById('epg-grid');
            grid.innerHTML = "";
            const now = new Date();
            for(let j=0; j<4; j++) {
                const time = new Date(now.getTime() + (j * 50 * 60 * 1000));
                grid.innerHTML += `
                    <div class="p-4 rounded-2xl border border-slate-800 ${j===0 ? 'bg-blue-600/10 border-blue-500/40' : 'bg-slate-900/50 opacity-40'}">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-blue-400 font-mono font-bold text-xs">${time.getHours()}:${String(time.getMinutes()).padStart(2,'0')}</span>
                            <span class="text-[8px] font-black uppercase tracking-widest px-2 py-1 rounded bg-slate-800">${j===0 ? 'Эфир' : 'Далее'}</span>
                        </div>
                        <div class="text-xs font-bold truncate uppercase tracking-tighter">${name} - Передача ${j+1}</div>
                        <div class="text-[9px] text-slate-500 mt-2 font-bold italic">${j===0 ? '📺 Доступна запись за 3 дня' : 'Будет доступно позже'}</div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
