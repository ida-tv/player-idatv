<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player IDATV - Final Ultimate Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.95); border: 1px solid #1e293b; }
        .active-ch { background: #2563eb !important; border-left: 4px solid #60a5fa; box-shadow: 0 0 15px rgba(37, 99, 235, 0.2); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .epg-card:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body onkeydown="handleKeys(event)">

    <!-- Header -->
    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-6 glass relative z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-500 italic uppercase tracking-tighter">PLAYER <span class="text-white">IDATV</span></h1>
            <div class="text-[11px] font-mono text-slate-500 border-l border-slate-700 pl-4 uppercase">
                <span id="h-time" class="text-white font-bold text-sm">00:00:00</span> | <span id="h-date">02.05.2026</span>
            </div>
        </div>
        <button onclick="toggleSet()" class="bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 px-4 py-2 rounded-xl border border-blue-500/20 transition text-[10px] font-black uppercase tracking-widest">⚙ Настройки</button>
    </header>

    <main class="flex h-[calc(100vh-56px)] flex-col lg:flex-row bg-slate-950">
        <!-- Видео и EPG -->
        <div class="flex-[3] flex flex-col p-4 gap-4 overflow-y-auto">
            <div class="relative aspect-video bg-black rounded-[2rem] border border-slate-800 shadow-2xl overflow-hidden group">
                <video id="tv" class="w-full h-full" controls autoplay playsinline></video>
                <!-- Lock Screen -->
                <div id="lock" class="absolute inset-0 bg-slate-900/98 flex flex-col items-center justify-center hidden z-50">
                    <p class="mb-4 font-bold text-red-500 tracking-widest">🔞 РОДИТЕЛЬСКИЙ КОНТРОЛЬ</p>
                    <input id="pin-in" type="password" maxlength="4" class="bg-slate-800 border border-slate-700 p-4 rounded-2xl text-center text-2xl w-32 outline-none focus:border-blue-500">
                    <button onclick="checkPin()" class="mt-4 bg-blue-600 px-10 py-3 rounded-2xl font-bold uppercase hover:bg-blue-500 transition">OK</button>
                </div>
            </div>

            <!-- EPG Блок -->
            <div class="glass p-6 rounded-[2rem] border-blue-500/10">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 id="ch-title" class="text-xl font-black italic text-white uppercase tracking-tighter">Выберите канал</h2>
                        <p id="epg-now-text" class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Прямой эфир • Архив 3 дня</p>
                    </div>
                    <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Live TV</span>
                </div>
                <div id="epg-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Программа передач -->
                </div>
            </div>
        </div>

        <!-- Боковая панель: Список каналов -->
        <aside class="w-full lg:w-[400px] border-l border-slate-800 glass flex flex-col">
            <div class="p-4 border-b border-slate-800 space-y-3 bg-slate-900/30 font-bold">
                <select id="cats" onchange="filterList()" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-[10px] uppercase font-black tracking-widest outline-none"></select>
                <input id="search" oninput="filterList()" placeholder="ПОИСК (↑ ↓ ENTER)" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-[11px] outline-none focus:border-blue-500 uppercase tracking-widest font-black">
            </div>
            <div id="list" class="flex-1 overflow-y-auto divide-y divide-slate-800/10"></div>
        </aside>
    </main>

    <!-- Настройки -->
    <div id="settings" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[100] p-4 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-[40px] w-full max-w-lg shadow-3xl">
            <h2 class="text-2xl font-black mb-8 italic text-blue-500 uppercase tracking-tighter">Setup IDATV</h2>
            <div class="space-y-4">
                <input type="file" id="file-in" accept=".m3u,.m3u8" class="w-full bg-slate-800 p-4 rounded-2xl text-xs border border-dashed border-slate-600">
                <input id="m-url" type="text" placeholder="Ссылка на плейлист" class="w-full bg-slate-800 p-4 rounded-2xl text-sm outline-none border border-slate-700 focus:border-blue-500">
                <input id="p-set" type="text" placeholder="ПИН-код (по умолчанию 1234)" class="w-full bg-slate-800 p-4 rounded-2xl text-sm text-center font-bold">
                <button onclick="save()" class="w-full bg-blue-600 py-4 rounded-3xl font-black uppercase tracking-widest hover:bg-blue-500 transition shadow-2xl shadow-blue-600/30">Сохранить и Обновить</button>
                <button onclick="toggleSet()" class="w-full text-slate-600 text-[10px] font-black uppercase mt-2">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        let chs = [];
        let hls = new Hls();
        let currentFocusIdx = 0;

        // Часы
        setInterval(() => {
            const d = new Date();
            document.getElementById('h-time').innerText = d.toLocaleTimeString();
            document.getElementById('h-date').innerText = d.toLocaleDateString();
        }, 1000);

        function toggleSet() { document.getElementById('settings').classList.toggle('hidden'); }

        async function save() {
            localStorage.setItem('m3u_url', document.getElementById('m-url').value);
            localStorage.setItem('pin_code', document.getElementById('p-set').value || "1234");
            
            const file = document.getElementById('file-in').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('cached_m3u', e.target.result);
                    location.reload();
                };
                reader.readAsText(file);
            } else {
                location.reload();
            }
        }

        async function init() {
            const cached = localStorage.getItem('cached_m3u');
            if (cached) parse(cached);
            else toggleSet();
        }

        function parse(data) {
            const lines = data.split('\n');
            const cats = new Set(["Все категории"]);
            chs = [];
            let cur = null;

            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    const g = l.match(/group-title="([^"]+)"/)?.[1] || "ОБЩИЕ";
                    cats.add(g);
                    cur = {
                        n: l.split(',')[1]?.trim() || "TV Channel",
                        g: g,
                        l: l.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        id: l.match(/tvg-id="([^"]+)"/)?.[1] || "",
                        u: "",
                        a: /adult|18\+|xxx/i.test(g + l)
                    };
                } else if (l.startsWith('http')) {
                    cur.u = l.trim();
                    chs.push({...cur});
                }
            });

            const sel = document.getElementById('cats');
            cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
            render(chs);
        }

        function render(list) {
            const container = document.getElementById('list');
            container.innerHTML = list.map((item, i) => `
                <div onclick="selectCh(${i})" id="ch-${i}" class="p-4 flex items-center gap-4 cursor-pointer hover:bg-slate-800 transition border-b border-slate-800/10 group">
                    <img src="${item.l}" class="w-11 h-11 rounded-xl bg-black object-contain border border-slate-800 group-hover:border-blue-500 transition" onerror="this.src='https://via.placeholder.com/40'">
                    <div class="flex-1 overflow-hidden">
                        <div class="text-[13px] font-black truncate uppercase italic tracking-tighter group-hover:text-blue-400 transition">${item.n}</div>
                        <div class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">${item.g}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterList() {
            const g = document.getElementById('cats').value;
            const s = document.getElementById('search').value.toLowerCase();
            const f = chs.filter(i => (g === 'Все категории' || i.g === g) && i.n.toLowerCase().includes(s));
            render(f);
        }

        function handleKeys(e) {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowDown') { e.preventDefault(); currentFocusIdx = Math.min(currentFocusIdx+1, chs.length-1); highlight(currentFocusIdx); }
            if (e.key === 'ArrowUp') { e.preventDefault(); currentFocusIdx = Math.max(currentFocusIdx-1, 0); highlight(currentFocusIdx); }
            if (e.key === 'Enter') selectCh(currentFocusIdx);
        }

        function highlight(idx) {
            document.querySelectorAll('[id^="ch-"]').forEach(i => i.classList.remove('active-ch'));
            const el = document.getElementById('ch-'+idx);
            if(el) { el.classList.add('active-ch'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }

        let selIdx = -1;
        function selectCh(i) {
            selIdx = i; highlight(i);
            const item = chs[i];
            if (item.a) { document.getElementById('lock').classList.remove('hidden'); return; }
            start(item.u, item.n);
        }

        function checkPin() {
            if (document.getElementById('pin-in').value === (localStorage.getItem('pin_code') || "1234")) {
                document.getElementById('lock').classList.add('hidden');
                start(chs[selIdx].u, chs[selIdx].n);
            } else alert("НЕВЕРНО");
        }

        // ЗАПУСК ПОТОКА + АРХИВ
        function start(u, n, timeShift = null) {
            document.getElementById('ch-title').innerText = n;
            const v = document.getElementById('tv');
            
            // Если выбран архив, добавляем параметр к ссылке
            let finalUrl = u;
            if (timeShift) {
                finalUrl += (u.includes('?') ? '&' : '?') + 'utc=' + timeShift;
                document.getElementById('epg-now-text').innerHTML = `🎞 ПРОСМОТР ЗАПИСИ • <button onclick="start('${u}', '${n}')" class="text-blue-500 font-black">ВЕРНУТЬСЯ В ЭФИР</button>`;
            } else {
                document.getElementById('epg-now-text').innerText = "🔴 ПРЯМОЙ ЭФИР • АРХИВ 3 ДНЯ";
            }

            if (Hls.isSupported()) {
                hls.destroy(); hls = new Hls();
                hls.loadSource(finalUrl); hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else { v.src = finalUrl; v.play(); }

            // Генерируем реальные кнопки архива
            const grid = document.getElementById('epg-grid');
            grid.innerHTML = "";
            const now = new Date();
            
            for(let j=-2; j<3; j++) {
                const t = new Date(now.getTime() + (j * 45 * 60 * 1000));
                const isPast = j < 0;
                const timestamp = Math.floor(t.getTime() / 1000);
                
                grid.innerHTML += `
                    <div onclick="${isPast ? "start('"+u+"', '"+n+"', "+timestamp+")" : ""}" class="epg-card p-4 rounded-2xl glass ${j===0 ? 'bg-blue-600/20 border-blue-500/50' : (isPast ? 'cursor-pointer hover:bg-slate-800' : 'opacity-40')} transition">
                        <div class="flex justify-between items-center mb-2 uppercase font-black tracking-widest text-[9px]">
                            <span class="text-blue-400">${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}</span>
                            <span class="text-slate-500">${j<0 ? '🎞 ЗАПИСЬ' : (j===0 ? '🔴 В ЭФИРЕ' : 'СКОРО')}</span>
                        </div>
                        <div class="text-[11px] font-bold truncate uppercase tracking-tighter">${n} — Выпуск ${j+3}</div>
                        <div class="text-[8px] text-slate-500 mt-2 italic">${isPast ? 'Нажмите, чтобы смотреть запись' : ''}</div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
