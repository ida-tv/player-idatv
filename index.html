<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player IDATV - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid #1e293b; }
        .active-ch { background: linear-gradient(90deg, #1e3a8a 0%, transparent 100%); border-left: 4px solid #3b82f6; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-6 glass sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-blue-500 italic">PLAYER <span class="text-white">IDATV</span></h1>
            <div class="text-xs font-mono text-slate-500 border-l border-slate-700 pl-4 uppercase">
                <span id="time" class="text-white font-bold">00:00:00</span> | <span id="date">02.05.2026</span>
            </div>
        </div>
        <button onclick="document.getElementById('config').classList.toggle('hidden')" class="w-8 h-8 flex items-center justify-center hover:bg-slate-800 rounded-full transition">⚙️</button>
    </header>

    <main class="flex h-[calc(100vh-56px)] flex-col lg:flex-row">
        <div class="flex-[3] flex flex-col p-4 gap-4 overflow-y-auto bg-slate-950">
            <div class="relative aspect-video bg-black rounded-3xl border border-slate-800 shadow-2xl overflow-hidden group">
                <video id="vid" class="w-full h-full" controls autoplay playsinline></video>
                <div id="adult-lock" class="absolute inset-0 bg-slate-900/98 flex flex-col items-center justify-center hidden z-50">
                    <span class="text-6xl mb-4">🔞</span>
                    <input id="pin-val" type="password" maxlength="4" placeholder="ПИН" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-center text-2xl w-32 outline-none focus:border-blue-500">
                    <button onclick="checkPin()" class="mt-4 bg-blue-600 px-8 py-2 rounded-xl font-bold">ВОЙТИ</button>
                </div>
            </div>

            <div class="glass p-5 rounded-2xl border-blue-500/10">
                <h2 id="now-name" class="text-lg font-bold text-white italic">Выберите канал</h2>
                <div id="epg-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
                    <!-- Программа передач -->
                </div>
            </div>
        </div>

        <aside class="w-full lg:w-[380px] border-l border-slate-800 glass flex flex-col">
            <div class="p-4 border-b border-slate-800 space-y-3 bg-slate-900/30">
                <select id="cat" onchange="filterCh()" class="w-full bg-slate-800 border border-slate-700 p-2.5 rounded-xl text-xs font-bold outline-none"></select>
                <input type="text" id="search" oninput="filterCh()" placeholder="Поиск..." class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs outline-none focus:border-blue-600">
            </div>
            <div id="list" class="flex-1 overflow-y-auto divide-y divide-slate-800/20"></div>
        </aside>
    </main>

    <div id="config" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[100] p-4">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-[40px] w-full max-w-md shadow-3xl">
            <h2 class="text-2xl font-black mb-6 text-blue-500">НАСТРОЙКИ</h2>
            <div class="space-y-4">
                <input id="url-m" type="text" placeholder="Ссылка на M3U" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-600 text-sm">
                <input id="pin-set" type="text" placeholder="ПИН-код (1234)" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-600 text-sm text-center">
                <button onclick="save()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-sm tracking-widest hover:bg-blue-500">СОХРАНИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        let allChannels = [];
        let hls = new Hls();

        setInterval(() => {
            const d = new Date();
            document.getElementById('time').innerText = d.toLocaleTimeString();
            document.getElementById('date').innerText = d.toLocaleDateString();
        }, 1000);

        async function save() {
            localStorage.setItem('m3u', document.getElementById('url-m').value);
            localStorage.setItem('pin', document.getElementById('pin-set').value || "1234");
            location.reload();
        }

        async function init() {
            const m = localStorage.getItem('m3u');
            if (!m) { document.getElementById('config').classList.remove('hidden'); return; }
            
            try {
                const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(m));
                const text = await r.text();
                parseM3U(text);
            } catch(err) {
                alert("Ошибка загрузки. Попробуйте обновить страницу.");
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const cats = new Set(["Все категории"]);
            allChannels = [];
            let cur = null;

            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    const g = l.match(/group-title="([^"]+)"/)?.[1] || "Разное";
                    cats.add(g);
                    cur = {
                        name: l.split(',')[1]?.trim() || "Без имени",
                        group: g,
                        logo: l.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        id: l.match(/tvg-id="([^"]+)"/)?.[1] || ""
                    };
                } else if (l.startsWith('http') && cur) {
                    cur.url = l.trim();
                    cur.adult = /adult|18\+|xxx|эротика|ero/i.test(cur.group + cur.name);
                    allChannels.push(cur);
                    cur = null;
                }
            });

            const sel = document.getElementById('cat');
            cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
            renderChannels(allChannels);
        }

        function renderChannels(list) {
            const c = document.getElementById('list');
            c.innerHTML = list.map((ch, i) => `
                <div onclick="playCh(${i})" id="ch-${i}" class="p-3.5 flex items-center gap-4 cursor-pointer hover:bg-slate-800/40 border-b border-slate-800/30 group">
                    <img src="${ch.logo}" class="w-9 h-9 rounded bg-black object-contain border border-slate-800" onerror="this.src='https://via.placeholder.com/40'">
                    <div class="flex-1 overflow-hidden">
                        <div class="text-[13px] font-bold truncate group-hover:text-blue-400">${ch.name}</div>
                        <div class="text-[9px] text-slate-500 uppercase font-black tracking-widest">${ch.group}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterCh() {
            const g = document.getElementById('cat').value;
            const s = document.getElementById('search').value.toLowerCase();
            const f = allChannels.filter(c => (g === 'Все категории' || c.group === g) && c.name.toLowerCase().includes(s));
            renderChannels(f);
        }

        let currentIdx = -1;
        function playCh(i) {
            currentIdx = i;
            const ch = allChannels[i];
            document.querySelectorAll('[id^="ch-"]').forEach(el => el.classList.remove('active-ch'));
            document.getElementById('ch-'+i).classList.add('active-ch');

            if (ch.adult) {
                document.getElementById('adult-lock').classList.remove('hidden');
                return;
            }
            startStream(ch.url, ch.name);
        }

        function checkPin() {
            if (document.getElementById('pin-val').value === (localStorage.getItem('pin') || "1234")) {
                document.getElementById('adult-lock').classList.add('hidden');
                startStream(allChannels[currentIdx].url, allChannels[currentIdx].name);
            } else { alert("ПИН-КОД НЕВЕРЕН"); }
        }

        function startStream(url, name) {
            document.getElementById('now-name').innerText = name;
            const v = document.getElementById('vid');
            if (Hls.isSupported()) {
                hls.destroy(); hls = new Hls();
                hls.loadSource(url); hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else { v.src = url; v.play(); }
            
            const grid = document.getElementById('epg-grid');
            grid.innerHTML = "";
            const now = new Date();
            for(let j=0; j<4; j++) {
                const time = new Date(now.getTime() + (j * 45 * 60 * 1000));
                grid.innerHTML += `
                    <div class="p-3 rounded-xl border border-slate-800 ${j===0 ? 'bg-blue-600/10' : 'bg-slate-900/50 opacity-60'}">
                        <div class="text-[10px] font-bold text-blue-400">${time.getHours()}:${String(time.getMinutes()).padStart(2,'0')}</div>
                        <div class="text-[11px] font-bold truncate">${name} - Передача ${j+1}</div>
                        <div class="text-[9px] text-slate-500 mt-1">${j===0 ? 'СЕЙЧАС В ЭФИРЕ (Архив 3 дня)' : 'СЛЕДУЮЩАЯ'}</div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
