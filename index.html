<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Player IDATV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { margin: 0; }
</style>
</head>

<body class="bg-gray-900 text-white">

<!-- HEADER -->
<div class="flex justify-between items-center p-3 bg-black">
  <div class="text-xl font-bold">Player IDATV</div>
  <div id="time"></div>
</div>

<div class="flex h-[calc(100vh-60px)]">

<!-- SIDEBAR -->
<div class="w-64 bg-gray-800 overflow-y-auto p-2">

<input id="m3uInput" placeholder="M3U ссылка"
class="w-full p-2 text-black rounded mb-2">

<input id="epgInput" placeholder="EPG XML ссылка"
class="w-full p-2 text-black rounded mb-2">

<button onclick="loadM3U()" class="w-full bg-blue-600 p-2 rounded mb-2">
Загрузить
</button>

<button onclick="loadEPG()" class="w-full bg-green-600 p-2 rounded mb-2">
EPG
</button>

<button onclick="showFavorites()" class="w-full bg-yellow-500 p-2 rounded">
Избранное
</button>

<div id="groups" class="mt-3"></div>

</div>

<!-- CONTENT -->
<div class="flex-1 flex flex-col">

<video id="player" controls class="w-full h-[320px] bg-black"></video>

<div class="p-3 bg-gray-800">
  <div id="nowTitle">Выберите канал</div>
  <div id="status" class="text-sm text-gray-400"></div>
  <div id="epgNow" class="text-sm text-green-400"></div>
</div>

<div id="channels" class="flex-1 overflow-y-auto"></div>

</div>

</div>

<script>
const video = document.getElementById('player');

let channels = [];
let currentGroup = "Все";
let hls;
let epg = [];
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

const PIN = "1234";

// ▶️ PLAY
function play(url, name) {

  if (name.includes("18")) {
    const pin = prompt("Введите PIN");
    if (pin !== PIN) return;
  }

  document.getElementById("nowTitle").innerText = name;
  document.getElementById("status").innerText = "Загрузка...";

  if (hls) hls.destroy();

  if (Hls.isSupported()) {
    hls = new Hls();

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());

    hls.on(Hls.Events.ERROR, () => {
      document.getElementById("status").innerText = "Ошибка потока";
    });

  } else {
    video.src = url;
    video.play();
  }

  showEPG(name);
}

// 📺 LOAD M3U
function loadM3U() {
  const url = document.getElementById("m3uInput").value;

  fetch('/api/m3u?url=' + encodeURIComponent(url))
    .then(r => r.text())
    .then(data => {

      channels = [];
      const lines = data.split('\n');

      for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith('#EXTINF')) {

          const name = lines[i].split(',')[1];
          const link = lines[i + 1];

          const groupMatch = lines[i].match(/group-title="(.*?)"/);
          const group = groupMatch ? groupMatch[1] : "Другие";

          channels.push({ name, link, group });
        }
      }

      renderGroups();
      renderChannels();
    });
}

// 📂 GROUPS
function renderGroups() {
  const el = document.getElementById("groups");
  el.innerHTML = "";

  const groups = ["Все", ...new Set(channels.map(c => c.group))];

  groups.forEach(g => {
    const div = document.createElement("div");
    div.innerText = g;
    div.className = "p-2 hover:bg-gray-700 cursor-pointer";

    div.onclick = () => {
      currentGroup = g;
      renderChannels();
    };

    el.appendChild(div);
  });
}

// 📺 CHANNELS
function renderChannels(list = null) {
  const el = document.getElementById("channels");
  el.innerHTML = "";

  const data = list || (currentGroup === "Все"
    ? channels
    : channels.filter(c => c.group === currentGroup));

  data.forEach(c => {
    const div = document.createElement("div");

    div.className = "flex justify-between p-3 border-b border-gray-700 hover:bg-gray-800";

    div.innerHTML = `
      <span>${c.name}</span>
      <button onclick="event.stopPropagation(); toggleFav('${c.name}','${c.link}')">⭐</button>
    `;

    div.onclick = () => play(c.link, c.name);

    el.appendChild(div);
  });
}

// ⭐ FAVORITES
function toggleFav(name, url) {
  const i = favorites.findIndex(f => f.url === url);

  if (i === -1) {
    favorites.push({ name, url });
  } else {
    favorites.splice(i, 1);
  }

  localStorage.setItem("fav", JSON.stringify(favorites));
}

function showFavorites() {
  renderChannels(favorites);
}

// 📺 EPG
function loadEPG() {
  const url = document.getElementById("epgInput").value;

  fetch(url)
    .then(r => r.text())
    .then(str => {
      const xml = new DOMParser().parseFromString(str, "text/xml");
      epg = [...xml.getElementsByTagName("programme")];
      alert("EPG загружен");
    });
}

function showEPG(name) {
  const now = new Date();

  const prog = epg.find(p => {
    return p.getAttribute("channel")?.includes(name);
  });

  if (prog) {
    document.getElementById("epgNow").innerText =
      prog.getElementsByTagName("title")[0]?.textContent;
  }
}

// 🕒 TIME
function updateTime() {
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleString('ru-RU');
}
setInterval(updateTime, 1000);
updateTime();

// STATUS
video.addEventListener('waiting', () => {
  document.getElementById("status").innerText = "Буферизация...";
});

video.addEventListener('playing', () => {
  document.getElementById("status").innerText = "В эфире";
});
</script>

</body>
</html>
