<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PLAYER IDATV - FINAL SECURE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: system-ui; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.98); border: 1px solid #1e293b; }
        .active-ch { background: #2563eb !important; border-left: 4px solid #60a5fa; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body onkeydown="handleKeys(event)">

    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 glass relative z-50">
        <h1 class="text-2xl font-black text-blue-500 italic uppercase">PLAYER IDATV</h1>
        <button onclick="toggleSet()" class="bg-blue-600 px-6 py-2 rounded-2xl font-bold uppercase text-xs shadow-lg">⚙ Настройки</button>
    </header>

    <main class="flex h-[calc(100vh-64px)] flex-col lg:flex-row bg-slate-950">
        <div class="flex-[3] flex flex-col p-4 gap-4 overflow-y-auto">
            <div class="relative aspect-video bg-black rounded-[2rem] border border-slate-800 overflow-hidden shadow-2xl">
                <video id="tv" class="w-full h-full" controls autoplay playsinline></video>
                <div id="lock" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center hidden z-50">
                    <input id="pin-in" type="password" maxlength="4" placeholder="ПИН" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-center text-4xl w-40 outline-none">
                    <button onclick="checkPin()" class="mt-6 bg-blue-600 px-12 py-3 rounded-xl font-bold uppercase">Войти</button>
                </div>
            </div>

            <div class="glass p-6 rounded-[2rem] border-blue-500/10">
                <h2 id="ch-title" class="text-xl font-bold italic uppercase tracking-tighter">Выберите канал</h2>
                <div id="epg-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4 text-xs opacity-40">
                    Программа передач доступна через защищенный шлюз...
                </div>
            </div>
        </div>

        <aside class="w-full lg:w-[420px] border-l border-slate-800 glass flex flex-col">
            <div class="p-4 border-b border-slate-800 space-y-3 bg-slate-900/40">
                <select id="cats" onchange="filterList()" class="w-full bg-slate-800 border border-slate-700 p-2 rounded text-[10px] uppercase font-bold outline-none"></select>
                <input id="search" oninput="filterList()" placeholder="ПОИСК..." class="w-full bg-slate-950 border border-slate-800 p-2 rounded text-xs outline-none uppercase font-bold">
            </div>
            <div id="list" class="flex-1 overflow-y-auto divide-y divide-slate-800/10 uppercase font-black text-[10px] tracking-widest text-center py-20 opacity-30">
                Плейлист загружается...
            </div>
        </aside>
    </main>

    <div id="settings" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[100] p-4 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-[40px] w-full max-w-lg shadow-3xl">
            <h2 class="text-2xl font-black mb-8 text-blue-500 uppercase tracking-tighter text-center italic">Конфигурация</h2>
            <div class="space-y-4">
                <input id="m-url" type="text" placeholder="M3U8 URL (даже http)" class="w-full bg-slate-800 p-4 rounded-2xl outline-none text-sm border border-slate-700">
                <input id="e-url" type="text" placeholder="EPG XMLTV URL" class="w-full bg-slate-800 p-4 rounded-2xl outline-none text-sm border border-slate-700">
                <input id="p-set" type="text" placeholder="ПИН (1234)" class="w-full bg-slate-800 p-4 rounded-2xl text-center font-bold">
                <button onclick="save()" class="w-full bg-blue-600 py-4 rounded-3xl font-black uppercase tracking-widest shadow-2xl transition">ПРИМЕНИТЬ</button>
                <button onclick="toggleSet()" class="w-full text-slate-600 text-[10px] font-black uppercase mt-2">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        let chs = [];
        let hls = new Hls();
        let currentIdx = 0;

        function toggleSet() { document.getElementById('settings').classList.toggle('hidden'); }

        async function save() {
            localStorage.setItem('m3u', document.getElementById('m-url').value);
            localStorage.setItem('epg', document.getElementById('e-url').value);
            localStorage.setItem('pin', document.getElementById('p-set').value || "1234");
            location.reload();
        }

        async function init() {
            const m = localStorage.getItem('m3u');
            if (m) {
                document.getElementById('m-url').value = m;
                document.getElementById('e-url').value = localStorage.getItem('epg') || '';
                document.getElementById('p-set').value = localStorage.getItem('pin') || '1234';

                try {
                    const r = await fetch(`/api/proxy?url=${encodeURIComponent(m)}`);
                    if(!r.ok) throw new Error('Ошибка шлюза');
                    parse(await r.text());
                } catch(e) { 
                    document.getElementById('list').innerText = "Ошибка загрузки через Proxy"; 
                }
            } else toggleSet();
        }

        function parse(data) {
            const lines = data.split('\n');
            const cats = new Set(["Все категории"]);
            chs = [];
            let cur = null;

            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    const g = l.match(/group-title="([^"]+)"/)?.[1] || "ОБЩИЕ";
                    cats.add(g);
                    cur = {
                        n: l.split(',')[1]?.trim() || "Channel",
                        g: g,
                        l: l.match(/tvg-logo="([^"]+)"/)?.[1] || "",
                        a: /adult|18\+|xxx/i.test(g + l)
                    };
                } else if (l.startsWith('http') && cur) {
                    cur.u = l.trim();
                    chs.push({...cur});
                    cur = null;
                }
            });

            const sel = document.getElementById('cats');
            sel.innerHTML = "";
            cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
            render(chs);
        }

        function render(list) {
            const c = document.getElementById('list');
            if (list.length === 0) {
                c.innerHTML = '<div class="p-10 opacity-30">Ничего не найдено</div>';
                return;
            }
            c.innerHTML = list.map((item, i) => {
                // Логотип тоже через прокси для обхода Mixed Content
                const finalLogo = item.l ? `/api/proxy?url=${encodeURIComponent(item.l)}` : 'https://via.placeholder.com/40';
                return `
                <div onclick="selectCh(${i})" id="ch-${i}" class="p-4 flex items-center gap-4 cursor-pointer hover:bg-slate-800 transition border-b border-slate-800/10 group">
                    <img src="${finalLogo}" 
                         class="w-10 h-10 rounded-xl bg-black object-contain border border-slate-800" 
                         onerror="if(!this.getAttribute('data-error')){this.setAttribute('data-error','1');this.src='https://via.placeholder.com/40';}">
                    <div class="flex-1 overflow-hidden text-left">
                        <div class="text-[13px] font-bold truncate uppercase italic group-hover:text-blue-400 transition">${item.n}</div>
                        <div class="text-[9px] text-slate-500 font-bold uppercase mt-1 leading-none">${item.g}</div>
                    </div>
                </div>
            `}).join('');
        }

        function selectCh(i) {
            currentIdx = i;
            const item = chs[i];
            document.querySelectorAll('[id^="ch-"]').forEach(el => el.classList.remove('active-ch'));
            const activeEl = document.getElementById('ch-'+i);
            if(activeEl) activeEl.classList.add('active-ch');

            if (item.a) { 
                document.getElementById('lock').classList.remove('hidden'); 
                return; 
            }
            start(item.u, item.n);
        }

        function checkPin() {
            if (document.getElementById('pin-in').value === (localStorage.getItem('pin') || "1234")) {
                document.getElementById('lock').classList.add('hidden');
                start(chs[currentIdx].u, chs[currentIdx].n);
            } else {
                alert("Неверный ПИН");
                document.getElementById('pin-in').value = "";
            }
        }

        function start(u, n) {
            document.getElementById('ch-title').innerText = n;
            const v = document.getElementById('tv');
            const secureUrl = `/api/proxy?url=${encodeURIComponent(u)}`;

            if (Hls.isSupported()) {
                hls.destroy(); 
                hls = new Hls();
                hls.loadSource(secureUrl); 
                hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                v.src = secureUrl;
            }

            const grid = document.getElementById('epg-grid');
            grid.innerHTML = "";
            const now = new Date();
            for(let j=-1; j<3; j++) {
                const t = new Date(now.getTime() + (j * 45 * 60 * 1000));
                grid.innerHTML += `<div class="p-3 rounded-xl glass ${j===0 ? 'bg-blue-600/10 border-blue-500/50' : 'opacity-40'}">
                    <div class="flex justify-between uppercase font-bold text-[8px] mb-1">
                        <span>${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}</span>
                        <span>${j===0 ? 'Эфир' : 'Далее'}</span>
                    </div>
                    <div class="truncate uppercase font-bold">${n} - Выпуск ${j+2}</div>
                </div>`;
            }
        }

        function filterList() {
            const g = document.getElementById('cats').value;
            const s = document.getElementById('search').value.toLowerCase();
            const f = chs.filter(i => (g === 'Все категории' || i.g === g) && i.n.toLowerCase().includes(s));
            render(f);
        }

        function handleKeys(e) {
            // Если фокус в инпуте поиска, стрелки не переключают каналы
            if (document.activeElement.id === 'search') return;
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectCh(Math.min(currentIdx + 1, chs.length - 1));
                document.getElementById('ch-' + currentIdx).scrollIntoView({ block: "center" });
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectCh(Math.max(currentIdx - 1, 0));
                document.getElementById('ch-' + currentIdx).scrollIntoView({ block: "center" });
            }
        }

        init();
    </script>
</body>
</html>
